<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>板块股票列表</title>
    <link rel="stylesheet" href="css/font-awesome/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/bankuai.css">
    <script src="js/echarts.js"></script>
    <script src="js/chart/Chart.min.js"></script>
    <script src="js/plugins/chartjs-plugin-zoom.min.js"></script>
    <script src="js/plugins/chartjs-plugin-datalabels.min.js"></script>
    <script src="js/plugins/core-js-bundle.min.js"></script>
    <script type="text/javascript" src="js/jquery.min.js"></script>
    <script src="js/bankuai.js"></script>
    <script>
        $(document).ready(function() {
            const blockCode = getBlockCodeFromUrl();
            if (blockCode) {
                fetchStockList(blockCode);
            }
        });
    </script>
</head>
<body>
    <div class="dashboard">
        <div class="card">
            <div class="card-title-row">
                <span class="card-title">
                    <i class="fas fa-chart-line"></i>
                    <span id="blockName"></span>
                </span>
                <a href="main.html" class="back-link" title="返回首页">
                    <i class="fas fa-arrow-left"></i> 返回
                </a>
            </div>

            <!-- 左右布局容器 -->
            <div class="split-view">
                <!-- 左侧：散点图 -->
                <div class="split-left">
                    <div class="split-section-title">散点图</div>
                    <div id="scatterChartContainer" class="echart"></div>
                </div>

                <!-- 右侧：列表 -->
                <div class="split-right">
                    <div class="split-section-title">
                        <label style="cursor:pointer;"><input type="checkbox" id="selectAll" onchange="toggleAllCk()"> 全选</label>
                        <button class="action-btn primary" id="compareBtn" onclick="openCompare()" disabled>📊 多股同列 (<span id="selCount">0</span>)</button>
                        <button class="action-btn" onclick="copyCodes()">📋 复制代码</button>
                    </div>
                    <div id="result"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 分时图模态框 -->
    <div id="chartModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;">
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:800px;background:#252538;padding:20px;border-radius:8px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
                <h3 id="modalTitle" style="margin:0;">分时图</h3>
                <button onclick="if (timeChartTimer) { clearInterval(timeChartTimer); timeChartTimer = null; } document.getElementById('chartModal').style.display='none'" style="background:none;border:none;color:#aaa;font-size:20px;cursor:pointer;">×</button>
            </div>
            <div id="modalChartContainer" style="width:100%;height:400px;"></div>
        </div>
    </div>

    <!-- 多股对比弹窗 -->
    <div id="stockModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:2000;">
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:95%;max-width:1200px;height:90%;background:#252538;padding:20px;border-radius:8px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
                <h3 style="margin:0;">多股同列</h3>
                <button onclick="closeStockModal()" style="background:none;border:none;color:#aaa;font-size:20px;cursor:pointer;">×</button>
            </div>
            <iframe id="stockModalFrame" style="width:100%;height:calc(80vh - 60px);border:none;"></iframe>
        </div>
    </div>

    <!-- Toast提示 -->
    <div id="toast" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:10px 20px;border-radius:4px;z-index:3000;"></div>
</body>
</html>
