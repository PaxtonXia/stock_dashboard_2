<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最强风口</title>
    <link rel="stylesheet" href="css/font-awesome/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/hotspot.css">
    <link rel="stylesheet" href="css/base.css">
    <script src="js/echarts.js"></script>
    <script src="js/jquery.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/hotspot.js"></script>
    <script src="https://unpkg.com/page-agent@latest/dist/page-agent.umd.js" crossorigin="true"></script>
</head>
<body>
    <!-- Modal HTML -->
    <div id="stockModal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <iframe id="stockModalFrame" class="modal-iframe"></iframe>
        </div>
    </div>
    <div class="brand-bar">
        <div class="brand-logo"><i class="fas fa-chart-line"></i></div>
        <div>
            <div class="brand-title">最强风口</div>
            <div class="brand-sub">实时追踪市场热点板块和概念</div>
        </div>
        <div id="current-time" class="brand-time"></div>
    </div>
    
    <div class="dashboard hotspot-dashboard">
        <!-- 最强风口板块卡片网格 -->
        <div class="card hotspot-card">
            <div class="card-title"><i class="fas fa-fire"></i> 最强风口 - 板块走势
                <i class="fas fa-external-link-alt theme-trend-link" title="风格主题趋势" data-url="theme-trend.html"></i>
            </div>
            <div class="hotspot-container" id="hotspotContainer">
                <div class="plate-cards-grid" id="plateCardsGrid"></div>
                <div id="loading-hotspot">加载中...</div>
                <div id="error-hotspot"></div>
            </div>
        </div>
    </div>
</body>
</html>
