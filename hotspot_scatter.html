<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>板块资金流向散点图</title>
    <link rel="stylesheet" href="css/font-awesome/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/hotspot.css">
    <script src="js/echarts.js"></script>
    <style>
        body { background: #0d1117; color: #e2e8f0; margin: 0; padding: 20px; }

        /* 覆盖 main.css 的 .dashboard 三栏网格布局 */
        .dashboard {
            display: block !important;
            padding: 0 !important;
            gap: 0 !important;
            grid-template-columns: unset !important;
        }

        /* 左右分栏布局 - 与 bankuai.html 一致 */
        .split-view {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            height: calc(100vh - 140px);
            min-height: 500px;
        }
        .split-left {
            flex: 1;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .split-right {
            width: 420px;
            min-width: 360px;
            display: flex;
            flex-direction: column;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
        }
        .split-section-title {
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 500;
            color: #e2e8f0;
            background: #1c2128;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .split-section-title label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .split-section-title .action-btn {
            margin-left: auto;
        }

        /* 散点图容器 */
        #scatter-container {
            flex: 1;
            min-height: 0;
            width: 100%;
        }

        /* 右侧股票列表 */
        .stock-list-header {
            display: grid;
            grid-template-columns: 28px 1fr 72px 80px 80px;
            gap: 4px;
            padding: 6px 12px;
            font-size: 11px;
            color: #889;
            border-bottom: 1px solid #21262d;
        }
        .stock-list-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }
        .stock-row {
            display: grid;
            grid-template-columns: 28px 1fr 72px 80px 80px;
            gap: 4px;
            padding: 5px 12px;
            font-size: 12px;
            align-items: center;
            cursor: pointer;
            transition: background 0.15s;
        }
        .stock-row:hover { background: #1a2030; }
        .stock-row .stock-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .stock-row .stock-code { color: #889; font-size: 11px; }
        .stock-row .num { text-align: right; }
        .rise { color: #ef4444; }
        .fall { color: #34d058; }
        .flat { color: #889; }

        /* 按钮 */
        .action-btn {
            padding: 4px 10px;
            font-size: 12px;
            border: 1px solid #30363d;
            border-radius: 4px;
            background: #21262d;
            color: #e2e8f0;
            cursor: pointer;
            transition: background 0.15s;
        }
        .action-btn:hover { background: #30363d; }
        .action-btn.primary { background: #1f6feb; border-color: #1f6feb; }
        .action-btn.primary:hover { background: #388bfd; }
        .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 加载/空状态 */
        .loading { text-align: center; padding: 60px; color: #889; font-size: 14px; }
        .empty { text-align: center; padding: 40px; color: #556; font-size: 13px; }

        /* 响应式 */
        @media (max-width: 900px) {
            .split-view { flex-direction: column; height: auto; }
            .split-right { width: 100%; min-width: 0; max-height: 50vh; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
    <div class="card">
        <div class="card-title-row">
            <span class="card-title">
                <i class="fas fa-fire"></i>
                <span id="plate-title">加载中...</span>
            </span>
            <a href="hotspot.html" class="back-link" title="返回热点">
                <i class="fas fa-arrow-left"></i> 返回
            </a>
        </div>

        <div class="split-view">
            <!-- 左侧：散点图 -->
            <div class="split-left">
                <div id="scatter-container">
                    <div class="loading">正在加载资金流向数据...</div>
                </div>
            </div>

            <!-- 右侧：股票列表 -->
            <div class="split-right">
                <div class="split-section-title">
                    <label><input type="checkbox" id="selectAll" onchange="toggleAllCk()"> 全选</label>
                    <button class="action-btn primary" id="compareBtn" onclick="openCompare()" disabled>📊 多股同列 (<span id="selCount">0</span>)</button>
                    <button class="action-btn" onclick="copyCodes()">📋 复制代码</button>
                </div>
                <div class="stock-list-header">
                    <span></span>
                    <span>名称代码</span>
                    <span class="num">涨跌幅</span>
                    <span class="num">净流入(万)</span>
                    <span class="num">现价</span>
                </div>
                <div class="stock-list-scroll" id="stockListBody"></div>
            </div>
        </div>
    </div>
    </div>

<script>
// ========== 工具函数 ==========
function getPlateIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('plateId') || params.get('id');
}

function getPlateNameFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name') || '';
    try { return decodeURIComponent(name); } catch(e) { return name; }
}

// ========== 数据获取 ==========

// 优先从 localStorage 读成分股
function loadStocksFromStorage(plateId) {
    try {
        const raw = localStorage.getItem('scatter_stocks_' + plateId);
        if (raw) {
            const stocks = JSON.parse(raw);
            if (Array.isArray(stocks) && stocks.length > 0) {
                console.log('[loadStocksFromStorage] plateId:', plateId, 'stocks:', stocks.length);
                return stocks;
            }
        }
    } catch(e) {
        console.error('[loadStocksFromStorage] error:', e);
    }
    return null;
}

// 降级：从选股宝 API 获取
async function fetchPlateStocksFallback(plateId) {
    try {
        const response = await fetch('https://flash-api.xuangubao.com.cn/api/surge_stock/stocks?normal=true&uplimit=true');
        const data = await response.json();
        if (data && data.code === 20000 && data.data && data.data.items) {
            const stocks = [];
            data.data.items.forEach(stock => {
                if (stock[8]) {
                    stock[8].forEach(plate => {
                        if (String(plate.id) === String(plateId)) {
                            const rawCode = stock[0];
                            const code = rawCode.split('.')[0];
                            stocks.push({
                                name: stock[1],
                                code: code,
                                change: stock[3] * 100,
                                price: stock[2]
                            });
                        }
                    });
                }
            });
            console.log('[fetchPlateStocksFallback] plateId:', plateId, 'found:', stocks.length);
            return stocks;
        }
    } catch (e) {
        console.error('fetchPlateStocksFallback error:', e);
    }
    return [];
}

// 批量获取个股资金流向（东方财富 API）
async function fetchStockFundFlows(stocks) {
    if (!stocks || stocks.length === 0) return [];
    
    const stocksWithMarket = stocks.map(s => {
        let market = '0';
        const c = s.code;
        if (c.startsWith('6') || c.startsWith('9')) market = '1';
        else if (c.startsWith('0') || c.startsWith('3')) market = '0';
        else if (c.startsWith('8') || c.startsWith('4')) market = '0';
        return { ...s, market: market, secid: market + '.' + c };
    });
    
    const batchSize = 80;
    const allData = [];
    const FUND_FIELDS = 'f2,f3,f4,f12,f14,f62';
    
    for (let i = 0; i < stocksWithMarket.length; i += batchSize) {
        const batch = stocksWithMarket.slice(i, i + batchSize);
        const secids = batch.map(s => s.secid).join(',');
        const url = 'https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&invt=2&fields=' + FUND_FIELDS + '&secids=' + secids;
        
        try {
            const resp = await fetch(url);
            const json = await resp.json();
            if (json.data && json.data.diff) {
                allData.push(...json.data.diff);
            }
        } catch (e) {
            console.error('fetch fund flow error:', e);
        }
    }
    
    console.log('[fetchStockFundFlows] requested:', stocks.length, 'returned:', allData.length);
    return allData;
}

// ========== 全局状态 ==========
var g_stocks = [];       // 原始股票列表 [{name,code,change,price}]
var g_fundData = [];     // 资金流数据
var g_fundMap = {};      // code -> fund item
var g_checked = {};      // code -> bool

// ========== 右侧股票列表渲染 ==========
function renderStockList(stocks, fundData) {
    const container = document.getElementById('stockListBody');
    if (!container) return;
    
    g_fundMap = {};
    (fundData || []).forEach(f => { g_fundMap[f.f12] = f; });
    
    const rows = [];
    stocks.forEach(s => {
        const f = g_fundMap[s.code] || {};
        const netInflow = (f.f62 || 0);
        const changePct = typeof s.change === 'number' ? s.change : parseFloat(s.change) || 0;
        const price = f.f2 || s.price || 0;
        
        if (netInflow === 0 && changePct === 0) return;
        
        rows.push({
            code: s.code,
            name: s.name,
            changePct: changePct,
            netInflow: netInflow,
            price: price
        });
    });
    
    rows.sort((a, b) => Math.abs(b.netInflow) - Math.abs(a.netInflow));
    
    if (rows.length === 0) {
        container.innerHTML = '<div class="empty">暂无有效数据</div>';
        return;
    }
    
    container.innerHTML = rows.map(row => {
        const rise = row.changePct >= 0;
        const colorClass = row.changePct > 0 ? 'rise' : row.changePct < 0 ? 'fall' : 'flat';
        const checked = g_checked[row.code] ? 'checked' : '';
        const inflowWan = (row.netInflow / 10000).toFixed(2);
        const inflowClass = row.netInflow >= 0 ? 'rise' : 'fall';
        
        return '<div class="stock-row" onclick="toggleCk(\'' + row.code + '\', this)">' +
            '<span><input type="checkbox" ' + checked + ' onchange="toggleCk(\'' + row.code + '\', this.parentElement.parentElement)" onclick="event.stopPropagation()"></span>' +
            '<span class="stock-name">' + row.name + '<br><span class="stock-code">' + row.code + '</span></span>' +
            '<span class="num ' + colorClass + '">' + (row.changePct >= 0 ? '+' : '') + row.changePct.toFixed(2) + '%</span>' +
            '<span class="num ' + inflowClass + '">' + (row.netInflow >= 0 ? '+' : '') + inflowWan + '</span>' +
            '<span class="num">' + (row.price ? row.price.toFixed(2) : '--') + '</span>' +
        '</div>';
    }).join('');
    
    updateSelCount();
}

// ========== 复选框逻辑 ==========
function toggleCk(code, rowEl) {
    if (!g_checked[code]) g_checked[code] = true;
    else g_checked[code] = false;
    
    const ck = rowEl.querySelector('input[type=checkbox]');
    if (ck) ck.checked = g_checked[code];
    
    updateSelCount();
}

function toggleAllCk() {
    const allCk = document.getElementById('selectAll');
    const checked = allCk.checked;
    
    document.querySelectorAll('#stockListBody input[type=checkbox]').forEach(ck => {
        ck.checked = checked;
        const row = ck.closest('.stock-row');
        if (row) {
            const code = row.querySelector('.stock-code').textContent;
            g_checked[code] = checked;
        }
    });
    
    updateSelCount();
}

function updateSelCount() {
    const count = Object.values(g_checked).filter(Boolean).length;
    const selCount = document.getElementById('selCount');
    if (selCount) selCount.textContent = count;
    
    const btn = document.getElementById('compareBtn');
    if (btn) btn.disabled = count < 2;
    
    const allCk = document.getElementById('selectAll');
    const total = document.querySelectorAll('#stockListBody input[type=checkbox]').length;
    if (allCk) allCk.checked = (count > 0 && count === total);
}

function getSelectedCodes() {
    return Object.keys(g_checked).filter(k => g_checked[k]);
}

// ========== 操作按钮 ==========
function copyCodes() {
    const codes = getSelectedCodes();
    if (codes.length === 0) {
        const allCodes = g_stocks.map(s => s.code).join(',');
        navigator.clipboard.writeText(allCodes).then(() => showToast('已复制全部代码'));
    } else {
        navigator.clipboard.writeText(codes.join(',')).then(() => showToast('已复制 ' + codes.length + ' 个代码'));
    }
}

// 打开 smart_money.html 弹窗（与 bankuai.js 一致）
function openSmartMoneyModal(stockCode, stockName) {
    var modal = document.getElementById('smartMoneyModal');
    if (!modal) {
        modal = document.createElement('div');
        modal.id = 'smartMoneyModal';
        modal.className = 'modal-overlay';
        modal.style.display = 'none';
        modal.innerHTML = '<div class="modal-content"><span class="modal-close" onclick="closeSmartMoneyModal()">&times;</span><iframe id="smartMoneyFrame" class="modal-iframe"></iframe></div>';
        document.body.appendChild(modal);
    }
    document.getElementById('smartMoneyFrame').src = 'smart_money.html##' + stockCode;
    modal.style.display = 'block';
}

function closeSmartMoneyModal() {
    var modal = document.getElementById('smartMoneyModal');
    if (modal) { modal.style.display = 'none'; document.getElementById('smartMoneyFrame').src = ''; }
}

var timeChart = null;
var timeChartTimer = null;

function closeChartModal() {
    const modal = document.getElementById('chartModal');
    if (modal) modal.style.display = 'none';
    if (timeChartTimer) { clearInterval(timeChartTimer); timeChartTimer = null; }
}

function showTimeChart(stockCode, stockName) {
    const marketSuffix = stockCode.startsWith('6') ? 'SS' : 'SZ';
    const xgbStockCode = stockCode + '.' + marketSuffix;
    const url = 'https://api-ddc-wscn.xuangubao.cn/market/trend?fields=tick_at,close_px,avg_px,turnover_volume,turnover_value,open_px,high_px,low_px,px_change,px_change_rate&prod_code=' + xgbStockCode;
    
    const modal = document.getElementById('chartModal');
    const chartContainer = document.getElementById('modalChartContainer');
    
    if (timeChartTimer) { clearInterval(timeChartTimer); timeChartTimer = null; }
    
    modal.style.display = 'block';
    document.getElementById('modalTitle').textContent = stockName + '（' + stockCode + '）分时图';
    
    if (!timeChart || timeChart.isDisposed()) {
        chartContainer.innerHTML = '';
        timeChart = echarts.init(chartContainer);
    }
    
    timeChart.showLoading({ text: '加载中...', color: '#4a9eff', textColor: '#aaa', maskColor: 'rgba(0,0,0,0)' });
    
    fetch(url).then(function(res) { return res.json(); }).then(function(data) {
        timeChart.hideLoading();
        if (data.code === 20000 && data.data && data.data.candle && data.data.candle[xgbStockCode]) {
            drawTimeChartFromXGB(stockCode, data);
        } else {
            timeChart.showLoading({ text: '没有获取到分时图数据', color: '#ff5252', textColor: '#ff5252', maskColor: 'rgba(0,0,0,0)' });
        }
    }).catch(function(err) {
        console.error('获取分时图数据失败:', err);
        timeChart.hideLoading();
        timeChart.showLoading({ text: '获取数据失败', color: '#ff5252', textColor: '#ff5252', maskColor: 'rgba(0,0,0,0)' });
    });
}

function processXGBTimeChartData(xgbData, stockCode) {
    const marketSuffix = stockCode.startsWith('6') ? 'SS' : 'SZ';
    const xgbStockCode = stockCode + '.' + marketSuffix;
    
    if (!xgbData.data || !xgbData.data.candle || !xgbData.data.candle[xgbStockCode]) {
        return { priceData: [], volumeData: [], timeAxis: [], preClose: 0 };
    }
    
    const stockData = xgbData.data.candle[xgbStockCode];
    const lines = stockData.lines || [];
    
    const timeAxis = [], priceData = [], volumeData = [];
    lines.forEach(function(line) {
        var timestamp = line[0];
        var closePrice = line[1];
        var volume = line[3];
        var date = new Date(timestamp * 1000);
        var time = ('0' + date.getHours()).slice(-2) + ':' + ('0' + date.getMinutes()).slice(-2);
        timeAxis.push(time);
        priceData.push(closePrice);
        volumeData.push(volume);
    });
    
    return { priceData: priceData, volumeData: volumeData, timeAxis: timeAxis, preClose: stockData.pre_close_px || 0 };
}

function ratioCalculate(price, yclose) {
    return ((price - yclose) / yclose * 100).toFixed(2);
}

function getMinMax(priceData, preClose) {
    var values = priceData.filter(function(v) { return v !== null; });
    var maxa = Math.max.apply(null, values);
    var mina = Math.min.apply(null, values);
    var zfa = Math.abs(maxa / preClose - 1);
    var zfb = Math.abs(mina / preClose - 1);
    
    function minValue() { return Number(zfa >= zfb ? preClose * (1 - zfa) : mina).toFixed(2); }
    function maxValue() { return Number(zfb >= zfa ? preClose * (1 + zfb) : maxa).toFixed(2); }
    
    var _interval = (maxValue() - minValue()) / 4;
    return { min: minValue(), max: maxValue(), interval: _interval };
}

function drawTimeChartFromXGB(stockCode, xgbData) {
    var r = processXGBTimeChartData(xgbData, stockCode);
    var priceData = r.priceData, volumeData = r.volumeData, timeAxis = r.timeAxis, preClose = r.preClose;
    
    if (priceData.length === 0) return;
    
    var mm = getMinMax(priceData, preClose);
    var min = mm.min, max = mm.max, interval = mm.interval;
    
    var option = {
        title: { show: false },
        animation: false,
        grid: [
            { left: '10%', right: '10%', top: '8%', height: '60%' },
            { left: '10%', right: '10%', top: '75%', height: '20%' }
        ],
        xAxis: [
            {
                type: 'category', data: timeAxis, boundaryGap: false,
                axisLine: { show: true, lineStyle: { color: '#555' } },
                axisLabel: {
                    color: '#aaa', fontSize: 12,
                    formatter: function(v) {
                        if (['09:30','10:30','11:30','13:00','14:00','15:00'].indexOf(v) !== -1 || v.slice(-2) === '00') return v;
                        return '';
                    }
                },
                axisTick: { show: false }
            },
            { gridIndex: 1, type: 'category', data: timeAxis, boundaryGap: false, axisLine: { show: true }, axisLabel: { show: false }, axisTick: { show: false } }
        ],
        yAxis: [
            {
                type: 'value', position: 'left', scale: true,
                min: parseFloat(min), max: parseFloat(max), interval: parseFloat(interval),
                splitLine: { show: true, lineStyle: { color: '#333', type: 'dashed' } },
                axisLine: { show: true, lineStyle: { color: '#555' } },
                axisLabel: {
                    color: function(v) { return v == preClose ? '#fff' : v > preClose ? '#ff3333' : '#00ff00'; },
                    formatter: function(v) { return Number(v).toFixed(2); }
                }
            },
            {
                type: 'value', position: 'right',
                min: parseFloat(min), max: parseFloat(max), interval: parseFloat(interval),
                splitLine: { show: false },
                axisLine: { show: true, lineStyle: { color: '#555' } },
                axisLabel: {
                    color: function(v) { var r = ratioCalculate(v, preClose); return r == 0 ? '#fff' : r > 0 ? '#ff3333' : '#00ff00'; },
                    formatter: function(v) { return ratioCalculate(v, preClose) + '%'; }
                }
            },
            {
                gridIndex: 1, type: 'value', position: 'right',
                splitLine: { show: true, lineStyle: { color: '#333', type: 'dashed' } },
                axisLine: { show: true, lineStyle: { color: '#555' } },
                axisLabel: { color: '#aaa', formatter: function(v) { return (v/10000).toFixed(0) + '万'; } }
            }
        ],
        tooltip: {
            trigger: 'axis',
            backgroundColor: 'rgba(30,30,45,0.95)', borderColor: '#444', textStyle: { color: '#fff' },
            formatter: function(params) {
                var result = params[0].name + '<br/>';
                var price, volume;
                params.forEach(function(p) {
                    if (p.seriesName === '价格') {
                        price = p.value;
                        var c = price > preClose ? '#ff3333' : '#00ff00';
                        result += '价格: <span style="color:' + c + '">' + price.toFixed(2) + '</span><br/>';
                        result += '涨跌幅: <span style="color:' + c + '">' + ratioCalculate(price, preClose) + '%</span><br/>';
                    } else if (p.seriesName === '成交量') {
                        volume = p.value;
                        result += '成交量: ' + (volume/10000).toFixed(0) + '万手';
                    }
                });
                return result;
            }
        },
        series: [
            {
                name: '价格', type: 'line', data: priceData, smooth: true, showSymbol: false,
                lineStyle: { width: 1, color: '#4a9eff' },
                markLine: {
                    symbol: 'none', label: { show: false },
                    lineStyle: { color: '#888', type: 'dashed' },
                    data: [{ yAxis: preClose }]
                }
            },
            {
                name: '成交量', type: 'bar', xAxisIndex: 1, yAxisIndex: 2,
                data: volumeData, barMaxWidth: 20,
                itemStyle: {
                    color: function(p) {
                        var v = p.value;
                        if (v === 0) return '#555';
                        return priceData[p.dataIndex] >= (priceData[p.dataIndex-1] || preClose) ? '#ff3333' : '#00ff00';
                    }
                }
            }
        ],
        dataZoom: [{ type: 'inside', xAxisIndex: [0, 1], start: 0, end: 100 }]
    };
    
    timeChart.setOption(option, true);
}

function openCompare() {
    const codes = getSelectedCodes();
    if (codes.length < 2) { showToast('请至少选2只股票'); return; }

    const names = [];
    document.querySelectorAll('#stockListBody .stock-row').forEach(row => {
        const codeEl = row.querySelector('.stock-code');
        const nameEl = row.querySelector('.stock-name');
        if (codeEl && nameEl) {
            const code = codeEl.textContent.trim();
            const name = nameEl.childNodes[0] ? nameEl.childNodes[0].textContent.trim() : '';
            if (codes.includes(code)) names.push(name || code);
        }
    });

    const params = codes.map((c, i) => c + ':' + (names[i] || c)).join(',');
    const url = 'stock-compare.html?codes=' + encodeURIComponent(params);

    const modal = document.getElementById('stockModal');
    const frame = document.getElementById('stockModalFrame');
    if (modal && frame) {
        frame.src = url;
        modal.style.display = 'block';
    } else {
        window.open(url, '_blank');
    }
}

function closeStockModal() {
    const modal = document.getElementById('stockModal');
    if (modal) {
        modal.style.display = 'none';
        const frame = document.getElementById('stockModalFrame');
        if (frame) frame.src = '';
    }
}

// Esc 关闭弹窗
(function() {
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeStockModal();
            closeChartModal();
            closeSmartMoneyModal();
        }
    });
    var sm = document.getElementById('stockModal');
    if (sm) sm.addEventListener('click', function(e) { if (e.target === this) closeStockModal(); });
    var cm = document.getElementById('chartModal');
    if (cm) cm.addEventListener('click', function(e) { if (e.target === this) closeChartModal(); });
    var smm = document.getElementById('smartMoneyModal');
    if (smm) smm.addEventListener('click', function(e) { if (e.target === this) closeSmartMoneyModal(); });
})();

function showToast(msg) {
    let toast = document.getElementById('toast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.88);color:#e2e8f0;padding:10px 22px;border-radius:8px;font-size:13px;z-index:3000;pointer-events:none;transition:opacity 0.3s;';
        document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.style.display = 'block';
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => { toast.style.display = 'none'; }, 300); }, 2000);
}

// ========== 散点图渲染 ==========
function renderScatterChart(stocks, fundData, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    
    if (window.scatterChart) {
        try { window.scatterChart.dispose(); } catch(e) {}
    }
    container.innerHTML = '';
    container.style.backgroundColor = '#0d1117';
    
    if (!stocks || stocks.length === 0) {
        container.innerHTML = '<div class="loading">暂无数据</div>';
        return;
    }
    
    const chart = echarts.init(container);
    window.scatterChart = chart;
    
    const fundMap = {};
    (fundData || []).forEach(f => { fundMap[f.f12] = f; });
    
    const validPts = [];
    stocks.forEach(s => {
        const f = fundMap[s.code] || {};
        const netInflow = (f.f62 || 0) / 10000;
        const changePct = typeof s.change === 'number' ? s.change : parseFloat(s.change) || 0;
        const amount = Math.abs(f.f62 || 0);
        
        if (amount === 0 && changePct === 0) return;
        
        const rise = changePct >= 0;
        validPts.push({
            value: [netInflow, changePct],
            _amount: amount,
            _name: s.name,
            _code: s.code,
            _rise: rise
        });
    });
    
    if (validPts.length === 0) {
        container.innerHTML = '<div class="loading">无有效成分股数据</div>';
        return;
    }
    
    // 用 Map 优化百分位计算
    const sorted = [...validPts].sort((a, b) => a._amount - b._amount);
    const rankMap = new Map();
    sorted.forEach((pt, idx) => rankMap.set(pt, idx));
    const total = sorted.length;
    
    validPts.forEach(pt => {
        const rank = rankMap.get(pt);
        const pct = total > 1 ? rank / (total - 1) : 0;
        pt.symbolSize = 6 + 64 * pct * pct;
        pt.itemStyle = {
            color: pt._rise ? '#ef4444' : '#34d058',
            opacity: 0.85
        };
    });
    
    console.log('[scatter] points:', validPts.length);
    
    const option = {
        animation: false,
        grid: { left: 80, right: 50, top: 30, bottom: 50 },
        xAxis: {
            type: 'value',
            name: '主力净流入(万)',
            nameTextStyle: { color: '#889', fontSize: 12 },
            splitLine: { lineStyle: { color: '#2a3444', type: 'dashed' } },
            axisLabel: { color: '#889' }
        },
        yAxis: {
            type: 'value',
            name: '涨跌幅%',
            nameTextStyle: { color: '#889', fontSize: 12 },
            splitLine: { lineStyle: { color: '#2a3444', type: 'dashed' } },
            axisLabel: { color: '#889' }
        },
        tooltip: {
            trigger: 'item',
            backgroundColor: 'rgba(17,24,39,0.95)',
            borderColor: '#2e3c51',
            textStyle: { color: '#e2e8f0' },
            formatter: function(p) {
                var d = p.data || {};
                var name = d._name || '';
                var code = d._code || '';
                var inflow = d.value ? d.value[0].toFixed(2) : '0';
                var change = d.value ? d.value[1].toFixed(2) : '0';
                return '<b>' + name + '</b> (' + code + ')<br/>净流入: ' + inflow + '万<br/>涨跌幅: ' + change + '%';
            }
        },
        series: [{
            type: 'scatter',
            data: validPts,
            label: {
                show: true,
                position: 'inside',
                formatter: function(p) {
                    return (p.data && p.data.symbolSize >= 18) ? (p.data._name || '') : '';
                },
                fontSize: 10,
                color: '#fff'
            }
        }]
    };
    
    chart.setOption(option);

    // 点击圆点打开 smart_money.html
    chart.on('click', function(params) {
        var d = params.data || {};
        var code = d._code || '';
        var name = d._name || '';
        if (!code) return;
        openSmartMoneyModal(code, name);
    });

    window.addEventListener('resize', function() { try { chart.resize(); } catch(e) {} });
}

// ========== 初始化 ==========
async function init() {
    var plateId = getPlateIdFromUrl();
    var plateName = getPlateNameFromUrl();
    
    if (!plateId) {
        document.getElementById('scatter-container').innerHTML = '<div class="loading">缺少板块ID参数</div>';
        return;
    }
    
    document.getElementById('plate-title').textContent = plateName || plateId;
    
    var stocks = loadStocksFromStorage(plateId);
    
    if (!stocks) {
        stocks = await fetchPlateStocksFallback(plateId);
    }
    
    if (!stocks || stocks.length === 0) {
        document.getElementById('scatter-container').innerHTML = '<div class="loading">该板块无成分股数据（请从热点页面点击📊图标进入）</div>';
        document.getElementById('stockListBody').innerHTML = '<div class="empty">暂无数据</div>';
        return;
    }
    
    g_stocks = stocks;
    document.getElementById('plate-title').textContent = plateName || plateId;
    
    var fundData = await fetchStockFundFlows(stocks);
    
    if (fundData.length === 0) {
        console.warn('[init] 资金流数据为空，散点图可能无法正常显示');
    }
    
    g_fundData = fundData;
    
    renderStockList(stocks, fundData);
    renderScatterChart(stocks, fundData, 'scatter-container');
}

init();
