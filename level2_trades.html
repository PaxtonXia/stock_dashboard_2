<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level2 逐笔成交分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #0d1117;
            color: #e6edf3;
            font-size: 12px;
        }
        .header {
            background: #161b22;
            padding: 8px 12px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .stock-info { display: flex; align-items: center; gap: 8px; }
        .stock-name { font-size: 14px; font-weight: 600; }
        .stock-code { color: #8b949e; font-size: 11px; }
        .price-info { display: flex; align-items: center; gap: 6px; }
        .current-price { font-size: 16px; font-weight: 700; }
        .price-up { color: #f85149; }
        .price-down { color: #3fb950; }
        .change-percent { padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 500; }
        .change-up { background: rgba(248,81,73,0.15); color: #f85149; }
        .change-down { background: rgba(63,185,80,0.15); color: #3fb950; }
        .search-box { display: flex; gap: 4px; }
        .search-box input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 4px 8px;
            border-radius: 3px;
            width: 80px;
            font-size: 11px;
        }
        .search-box input:focus { outline: none; border-color: #58a6ff; }
        .search-box button {
            background: #238636;
            border: none;
            color: #fff;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }
        .search-box button:hover { background: #2ea043; }
        .nav-links { display: flex; gap: 6px; margin-left: 12px; }
        .nav-link {
            background: #21262d;
            color: #58a6ff;
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 3px;
            border: 1px solid #30363d;
            font-size: 11px;
        }
        .nav-link:hover { background: #30363d; }
        .main-content { padding: 8px; display: flex; flex-direction: column; gap: 8px; }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 4px; padding: 6px 8px; }
        .stat-label { color: #8b949e; font-size: 10px; margin-bottom: 2px; }
        .stat-value { font-size: 14px; font-weight: 600; }
        .stat-value.positive { color: #f85149; }
        .stat-value.negative { color: #3fb950; }
        .chart-container { background: #161b22; border: 1px solid #30363d; border-radius: 4px; padding: 8px; margin-bottom: 8px; }
        .chart-title { font-size: 12px; font-weight: 500; margin-bottom: 6px; }
        .chart { width: 100%; height: 200px; }
        .chart-small { height: 160px; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .loading { text-align: center; padding: 40px; color: #8b949e; }
        .trade-list { max-height: 200px; overflow-y: auto; }
        .trade-item { display: grid; grid-template-columns: 60px 70px 60px 60px 80px; padding: 4px 8px; border-bottom: 1px solid #21262d; font-size: 11px; }
        .trade-item:hover { background: #21262d; }
        .trade-header { display: grid; grid-template-columns: 60px 70px 60px 60px 80px; padding: 4px 8px; background: #21262d; font-size: 11px; color: #8b949e; font-weight: 500; }
        .trade-footer { padding: 6px; text-align: center; color: #8b949e; font-size: 10px; border-top: 1px solid #30363d; background: #161b22; }
        .buy { color: #f85149; }
        .sell { color: #3fb950; }
        
        /* 成交分类样式 */
        .main-buy { color: #f85149; font-weight: 600; }      /* 主力主买 - 红色加粗 */
        .main-sell { color: #3fb950; font-weight: 600; }     /* 主力主卖 - 绿色加粗 */
        .passive-buy { color: #f97583; }                    /* 主力被买 - 浅红色 */
        .passive-sell { color: #7ee787; }                   /* 主力被卖 - 浅绿色 */
        
        /* 筛选器样式 */
        .trade-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .filter-group { display: flex; align-items: center; gap: 8px; }
        .filter-label { color: #8b949e; font-size: 13px; }
        #categoryFilter { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
        #categoryFilter:hover { border-color: #58a6ff; }
        #categoryFilter option { background: #21262d; }
        
        /* 主力动态分析面板样式 - 紧凑版 */
        .smart-money-panel { background: #161b22; border: 1px solid #30363d; border-radius: 4px; padding: 8px; margin-bottom: 8px; }
        .smart-money-title { font-size: 12px; font-weight: 600; margin-bottom: 8px; color: #e6edf3; }
        .smart-money-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 6px; }
        .metric-card { background: #0d1117; border: 1px solid #30363d; border-radius: 3px; padding: 6px; }
        .metric-label { color: #8b949e; font-size: 10px; margin-bottom: 2px; }
        .metric-value { font-size: 13px; font-weight: 600; color: #e6edf3; }
        .metric-value.positive { color: #f85149; }
        .metric-value.negative { color: #3fb950; }
        .metric-value.neutral { color: #ffd700; }
        .metric-hint { font-size: 9px; color: #6e7681; margin-top: 2px; }
        .score-bar { height: 4px; background: #21262d; border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .score-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease; }
        .score-fill.high { background: linear-gradient(90deg, #f85149, #ff7b72); }
        .score-fill.medium { background: linear-gradient(90deg, #ffd700, #ffea00); }
        .score-fill.low { background: linear-gradient(90deg, #3fb950, #56d364); }
        .rating-text { font-size: 10px; font-weight: 600; margin-top: 3px; }
        .rating-text.high { color: #f85149; }
        .rating-text.medium { color: #ffd700; }
        .rating-text.low { color: #3fb950; }
        .alert-box { background: rgba(255, 217, 0, 0.08); border-left: 2px solid #ffd700; padding: 6px 8px; border-radius: 2px; }
        .alert-box.alert-buy { background: rgba(248, 81, 73, 0.08); border-left-color: #f85149; }
        .alert-box.alert-sell { background: rgba(63, 185, 80, 0.08); border-left-color: #3fb950; }
        .alert-title { font-size: 10px; font-weight: 600; color: #ffd700; margin-bottom: 2px; }
        .alert-box.alert-buy .alert-title { color: #f85149; }
        .alert-box.alert-sell .alert-title { color: #3fb950; }
        .alert-content { font-size: 10px; color: #c9d1d9; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display: flex; align-items: center;">
            <div class="stock-info">
                <div class="stock-name" id="stockName">加载中...</div>
                <div class="stock-code" id="stockCode"></div>
            </div>
            <div class="price-info" id="priceInfo" style="display: none;">
                <div class="current-price" id="currentPrice"></div>
                <div class="change-percent" id="changePercent"></div>
            </div>
        </div>
        <div style="display: flex; align-items: center;">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="股票代码">
                <button id="searchBtn">查询</button>
            </div>
            <div class="nav-links">
                <a href="#" class="nav-link" id="navIntraday">分时图</a>
                <a href="#" class="nav-link" id="navDayK">日K图</a>
            </div>
        </div>
    </div>
    
    <div class="main-content">
        <!-- 主力动态分析面板 -->
        <div class="smart-money-panel" id="smartMoneyPanel" style="display: none;">
            <div class="smart-money-title">主力动态分析</div>
            <div class="smart-money-grid">
                <div class="metric-card">
                    <div class="metric-label">综合评分</div>
                    <div class="metric-value" id="smScore">--</div>
                    <div class="score-bar">
                        <div class="score-fill high" id="smScoreFill" style="width: 0%;"></div>
                    </div>
                    <div class="rating-text high" id="smRating">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">主动买入比率</div>
                    <div class="metric-value" id="smActiveRatio">--</div>
                    <div class="metric-hint" id="smActiveHint">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">堆积密度</div>
                    <div class="metric-value" id="smDensity">--</div>
                    <div class="metric-hint" id="smDensityHint">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">净流入速度</div>
                    <div class="metric-value" id="smFlowSpeed">--</div>
                    <div class="metric-hint" id="smFlowHint">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">波形类型</div>
                    <div class="metric-value" id="smWaveType">--</div>
                    <div class="metric-hint" id="smWaveHint">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">尾盘异动</div>
                    <div class="metric-value" id="smTailSignal">--</div>
                    <div class="metric-hint" id="smTailHint">--</div>
                </div>
            </div>
            <div class="alert-box" id="smAlertBox" style="display: none;">
                <div class="alert-title" id="smAlertTitle">--</div>
                <div class="alert-content" id="smAlertContent">--</div>
            </div>
        </div>
        
        <div class="stats-row" id="statsRow" style="display: none;">
            <div class="stat-card">
                <div class="stat-label">主力净流入</div>
                <div class="stat-value" id="netInflow">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">主力买入额</div>
                <div class="stat-value positive" id="buyAmount">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">主力卖出额</div>
                <div class="stat-value negative" id="sellAmount">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">大单笔数</div>
                <div class="stat-value" id="tradeCount">--</div>
            </div>
        </div>
        
        <div class="two-col">
            <div class="chart-container">
                <div class="chart-title">逐笔成交（气泡=金额）</div>
                <div class="chart chart-small" id="scatterChart"></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">资金分类走势</div>
                <div class="chart chart-small" id="fundCategoryChart"></div>
            </div>
        </div>
        
        <div class="two-col">
            <div class="chart-container">
                <div class="chart-title">分钟资金流向</div>
                <div class="chart chart-small" id="flowChart"></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">累计净流入</div>
                <div class="chart chart-small" id="cumulativeChart"></div>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="trade-header-row">
                <div class="chart-title">大单明细</div>
                <div class="filter-group">
                    <label class="filter-label">筛选：</label>
                    <select id="categoryFilter" onchange="filterTrades()">
                        <option value="all">全部</option>
                        <option value="main-buy">主买</option>
                        <option value="main-sell">主卖</option>
                        <option value="passive-buy">被买</option>
                        <option value="passive-sell">被卖</option>
                    </select>
                </div>
            </div>
            <div class="trade-list" id="tradeList">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>
    
    <script>
        let currentCode = "";
        let scatterChart = null;
        let flowChart = null;
        let cumulativeChart = null;
        let fundCategoryChart = null;
        
        function initCharts() {
            if (typeof echarts === 'undefined') {
                console.error('ECharts 未加载');
                return;
            }
            scatterChart = echarts.init(document.getElementById("scatterChart"));
            flowChart = echarts.init(document.getElementById("flowChart"));
            cumulativeChart = echarts.init(document.getElementById("cumulativeChart"));
            fundCategoryChart = echarts.init(document.getElementById("fundCategoryChart"));
            window.addEventListener("resize", function() {
                scatterChart && scatterChart.resize();
                flowChart && flowChart.resize();
                cumulativeChart && cumulativeChart.resize();
                fundCategoryChart && fundCategoryChart.resize();
            });
        }
        
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        function searchStock() {
            const input = document.getElementById("searchInput").value.trim();
            if (input) window.location.href = "?code=" + input;
        }
        
        document.getElementById("searchInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") searchStock();
        });
        document.getElementById("searchBtn").addEventListener("click", searchStock);
        
        function formatMoney(value) {
            const absVal = Math.abs(value);
            if (absVal >= 100000000) return (value / 100000000).toFixed(2) + "亿";
            if (absVal >= 10000) return (value / 10000).toFixed(2) + "万";
            return value.toFixed(2);
        }
        
        function formatTime(timeStr) {
            if (timeStr.length === 4) return timeStr.slice(0, 2) + ":" + timeStr.slice(2);
            return timeStr;
        }
        
        function parseMinuteIndex(timeStr) {
            // 兼容多种时间格式: "0925", "09:25", "9:25", "09:25:00"
            const cleaned = String(timeStr).replace(/:/g, '');
            const hour = parseInt(cleaned.slice(0, 2));
            // 只取分钟部分（第2-4位），忽略秒
            const minute = parseInt(cleaned.slice(2, 4));
            if (isNaN(hour) || isNaN(minute)) {
                console.warn('时间解析失败:', timeStr, '-> cleaned:', cleaned, '-> hour:', hour, 'minute:', minute);
                return 120; // 默认返回中午
            }
            if (hour < 12) return (hour - 9) * 60 + minute - 30;
            return 120 + (hour - 13) * 60 + minute;
        }
        
        async function fetchLevel2Data(code) {
            const url = "https://vaserviece.10jqka.com.cn/Level2/index.php?op=mainMonitorDetail&stockcode=" + code;
            try {
                const response = await fetch(url);
                return await response.json();
            } catch (e) {
                console.error("获取 Level2 数据失败:", e);
                return null;
            }
        }
        
        function renderScatterChart(trades) {
            if (!scatterChart || !trades.length) {
                console.log('散点图跳过:', scatterChart ? '无数据' : '图表未初始化', 'trades:', trades.length);
                return;
            }
            console.log('渲染散点图，数据:', trades.length, '笔');
            console.log('第一条数据:', trades[0]);
            const buyData = [], sellData = [];
            const THRESHOLD = 1000000; // 100万
            trades.forEach(function(t, i) {
                // 格式: {value: [分钟索引, 价格, 金额], volume: 成交量, isBuy: true/false}
                // tradetype: "1"=买入，"2"=卖出
                let amount = 0;
                if (t.money && !isNaN(t.money)) amount = parseFloat(t.money);
                else if (t.value) amount = parseFloat(t.value) * 10000; // "178万" → 1780000
                const minuteIdx = parseMinuteIndex(t.ctime);
                const price = parseFloat(t.avgprice || 0);
                const volume = parseInt(t.volume) || 0;
                const isBuy = t.tradetype === "1" || t.tradetype === 1;
                const isLarge = amount >= THRESHOLD;
                
                // 分类：主力主买/主力主卖/主力被买/主力被卖
                let category;
                if (isBuy) {
                    category = isLarge ? "主力主买" : "主力被卖";
                } else {
                    category = isLarge ? "主力主卖" : "主力被买";
                }
                
                if (i < 3) console.log('数据样例:', i, 'ctime=', t.ctime, 'minuteIdx=', minuteIdx, 'price=', price, 'amount=', amount, 'volume=', volume, 'category=', category);
                
                // ECharts 4.x 散点图数据格式
                const pt = {
                    value: [minuteIdx, price, amount],
                    volume: volume,
                    isBuy: isBuy,
                    category: category
                };
                if (isBuy) buyData.push(pt);
                else sellData.push(pt);
            });
            console.log('买入点:', buyData.length, '卖出点:', sellData.length);
            
            // 生成时间轴标签（散点图用 value 轴，需要单独配置 label）
            const scatterXLabels = [];
            for (let i = 0; i <= 241; i++) {
                let hour, minute;
                if (i < 120) {
                    hour = 9 + Math.floor((i + 30) / 60);
                    minute = (i + 30) % 60;
                } else {
                    hour = 13 + Math.floor((i - 120) / 60);
                    minute = (i - 120) % 60;
                }
                scatterXLabels.push(String(hour).padStart(2, '0') + ':' + String(minute).padStart(2, '0'));
            }
            
            const option = {
                backgroundColor: "transparent",
                tooltip: { 
                    trigger: "item",
                    backgroundColor: 'rgba(22, 27, 34, 0.95)',
                    borderColor: '#30363d',
                    borderWidth: 1,
                    padding: [10, 12],
                    textStyle: { color: '#e6edf3', fontSize: 13 },
                    formatter: function(params) {
                        const d = params.data;
                        const time = scatterXLabels[d.value[0]] || d.value[0];
                        const price = d.value[1].toFixed(2);
                        const amount = (d.value[2]/10000).toFixed(2);
                        const volume = d.volume || '--';
                        const direction = d.isBuy ? '<span style="color:#f85149;font-weight:600">买入</span>' : '<span style="color:#3fb950;font-weight:600">卖出</span>';
                        const category = d.category || '--';
                        const categoryColor = d.category === '主力主买' ? '#f85149' : 
                                              d.category === '主力主卖' ? '#3fb950' : 
                                              d.category === '主力被买' ? '#e8860a' : '#58a6ff';
                        
                        return '<div style="line-height:1.8">' +
                            '<div style="font-weight:600;margin-bottom:4px;border-bottom:1px solid #30363d;padding-bottom:6px">' +
                            '<span style="color:' + categoryColor + '">' + category + '</span></div>' +
                            '<div>时间: ' + time + '</div>' +
                            '<div>价格: <span style="color:#58a6ff;font-weight:500">' + price + '</span></div>' +
                            '<div>金额: <span style="color:#ffd700;font-weight:500">' + amount + '万</span></div>' +
                            '<div>成交量: ' + volume + '股</div>' +
                            '<div>方向: ' + direction + '</div>' +
                            '</div>';
                    }
                },
                grid: { left: "10%", right: "10%", top: "10%", bottom: "15%" },
                xAxis: {
                    type: "value", min: 0, max: 241,
                    axisLabel: { 
                        color: "#8b949e",
                        formatter: function(value) {
                            return scatterXLabels[value] || value;
                        },
                        interval: 59
                    },
                    splitLine: { lineStyle: { color: "#21262d" } }
                },
                yAxis: {
                    type: "value", scale: true,
                    axisLabel: { color: "#8b949e" },
                    splitLine: { lineStyle: { color: "#21262d" } }
                },
                // 注意：ECharts 渲染顺序是后面的 series 在上层
                // 所以把卖出放前面，买入放后面，这样买入（红色）会显示在顶层
                series: [
                    { name: "卖出", type: "scatter", data: sellData,
                      symbolSize: function(d) { 
                          // d 是对象 {value: [...], volume, isBuy, category}
                          const amount = d.value ? d.value[2] : d[2];
                          return Math.max(6, Math.min(50, Math.sqrt(Math.abs(amount))/100)); 
                      },
                      itemStyle: { color: "rgba(63,185,80,0.7)" } },
                    { name: "买入", type: "scatter", data: buyData,
                      symbolSize: function(d) { 
                          const amount = d.value ? d.value[2] : d[2];
                          return Math.max(6, Math.min(50, Math.sqrt(Math.abs(amount))/100)); 
                      },
                      itemStyle: { color: "rgba(248,81,73,0.7)" } }
                ]
            };
            scatterChart.setOption(option);
        }
        
        function renderFlowChart(priceChange) {
            console.log('renderFlowChart 调用, flowChart:', flowChart ? '已初始化' : 'null', '数据:', priceChange ? priceChange.length : 'null');
            if (!flowChart) {
                console.error('flowChart 未初始化！');
                return;
            }
            if (!priceChange || !priceChange.length) {
                console.error('priceChange 数据为空');
                return;
            }
            console.log('资金流向数据:', priceChange.length, '条');
            console.log('样例数据:', priceChange.slice(0, 3));
            console.log('第一个元素类型:', typeof priceChange[0], '内容:', priceChange[0]);
            if (typeof priceChange[0] === 'object' && priceChange[0] !== null) {
                console.log('第一个元素的键:', Object.keys(priceChange[0]));
            }
            const xData = [], yData = [];
            priceChange.forEach(function(v, i) {
                var num = 0;
                if (typeof v === 'object' && v !== null) {
                    // pricechange 格式: {1: '202604300930', 2525646: 0.0195}
                    // 键是数字（时间戳和值），值取最大的那个数字键 → flow value
                    var keys = Object.keys(v).map(Number);
                    var numericKey = null;
                    for (var k = 0; k < keys.length; k++) {
                        if (typeof v[keys[k]] === 'number') {
                            numericKey = keys[k];
                            break;
                        }
                    }
                    if (numericKey !== null) {
                        num = v[numericKey];
                    }
                } else {
                    num = parseFloat(v) || 0;
                }
                xData.push(i);
                yData.push(num);
            });
            console.log('转换后 yData 前5条:', yData.slice(0, 5));
            const option = {
                backgroundColor: "transparent",
                tooltip: { trigger: "axis" },
                grid: { left: "10%", right: "5%", top: "10%", bottom: "15%" },
                xAxis: {
                    type: "category", data: xData,
                    axisLabel: { color: "#8b949e", interval: 59 },
                    splitLine: { show: false }
                },
                yAxis: { type: "value", axisLabel: { color: "#8b949e" }, splitLine: { lineStyle: { color: "#21262d" } } },
                series: [{
                    type: "bar", data: yData,
                    itemStyle: {
                        color: function(params) {

        // ========== 主力动态分析计算函数 ==========
        function computeSmartMoneyMetrics(trades, priceChange) {
            const THRESHOLD = 1000000; // 100万
            const FUND_COLS = 241;
            
            // 1. 按分钟索引聚合数据
            const minuteFlows = new Array(FUND_COLS).fill(0);
            const minuteBuyAmounts = new Array(FUND_COLS).fill(0);
            const minuteSellAmounts = new Array(FUND_COLS).fill(0);
            const minuteTrades = new Array(FUND_COLS).fill(null).map(function() { return []; });
            
            let totalBuy = 0, totalSell = 0;
            let activeBuy = 0, activeSell = 0; // 主动买卖
            
            trades.forEach(function(t) {
                const isBuy = t.tradetype === "1" || t.tradetype === 1;
                let amount = 0;
                if (t.money && !isNaN(t.money)) amount = parseFloat(t.money);
                else if (t.value) amount = parseFloat(String(t.value).replace(/[^\d.]/g, '')) * 10000;
                if (amount <= 0) return;
                
                const idx = parseMinuteIndex(t.ctime);
                if (idx < 0 || idx >= FUND_COLS) return;
                
                minuteTrades[idx].push({ isBuy: isBuy, amount: amount, price: parseFloat(t.avgprice) || 0, time: t.ctime });
                
                if (isBuy) {
                    totalBuy += amount;
                    minuteBuyAmounts[idx] += amount;
                    if (amount >= 500000) activeBuy += amount; // 50万以上算主动
                } else {
                    totalSell += amount;
                    minuteSellAmounts[idx] += amount;
                    if (amount >= 500000) activeSell += amount;
                }
                
                minuteFlows[idx] += isBuy ? amount : -amount;
            });
            
            // 2. 综合评分计算
            const totalAmount = totalBuy + totalSell;
            const netInflow = totalBuy - totalSell;
            
            // 2.1 净流入强度 (25分)
            const netFlowRatio = totalAmount > 0 ? netInflow / totalAmount : 0;
            const netFlowScore = Math.min(25, Math.max(0, 12.5 + netFlowRatio * 125));
            
            // 2.2 主动买入比率 (20分)
            const activeTotal = activeBuy + activeSell;
            const activeRatio = activeTotal > 0 ? activeBuy / activeTotal : 0.5;
            const activeScore = activeRatio > 0.5 ? (activeRatio - 0.5) * 40 : 0;
            
            // 2.3 堆积密度 (20分)
            let maxDensity = 0;
            let densityClusters = [];
            let currentCluster = { start: -1, amount: 0, count: 0, direction: 0 };
            
            for (let i = 0; i < FUND_COLS; i++) {
                const flow = minuteFlows[i];
                if (Math.abs(flow) >= 500000) { // 50万以上算有意义的流量
                    const dir = flow > 0 ? 1 : -1;
                    if (currentCluster.direction === dir) {
                        currentCluster.amount += Math.abs(flow);
                        currentCluster.count++;
                        currentCluster.end = i;
                    } else {
                        if (currentCluster.count >= 3) {
                            densityClusters.push(currentCluster);
                        }
                        currentCluster = { start: i, amount: Math.abs(flow), count: 1, direction: dir, end: i };
                    }
                }
            }
            if (currentCluster.count >= 3) densityClusters.push(currentCluster);
            
            densityClusters.forEach(function(c) {
                const dur = Math.max(1, c.end - c.start + 1);
                const density = c.amount / 10000 / dur; // 万元/分钟
                if (density > maxDensity) maxDensity = density;
            });
            
            const densityScore = Math.min(20, maxDensity / 50); // 1000万/分钟 = 满分
            
            // 2.4 波形质量 (20分)
            // 简化版：统计前/中/后三段的净流入分布
            const firstThird = minuteFlows.slice(0, 80).reduce(function(a,b){return a+b;}, 0);
            const middleThird = minuteFlows.slice(80, 160).reduce(function(a,b){return a+b;}, 0);
            const lastThird = minuteFlows.slice(160).reduce(function(a,b){return a+b;}, 0);
            const totalFlow = firstThird + middleThird + lastThird;
            
            let waveType = 'neutral';
            let waveScore = 10;
            
            if (totalFlow > 0) {
                if (firstThird > totalFlow * 0.5 && lastThird < totalFlow * 0.2) {
                    waveType = 'exhaustion';
                    waveScore = 5;
                } else if (lastThird > totalFlow * 0.3) {
                    waveType = 'accumulation';
                    waveScore = 18;
                } else if (firstThird > 0 && middleThird > 0 && lastThird > 0) {
                    waveType = 'steady';
                    waveScore = 15;
                }
            } else {
                waveType = 'distribution';
                waveScore = 5;
            }
            
            // 2.5 尾盘信号 (15分)
            const tailFlow = minuteFlows.slice(210).reduce(function(a,b){return a+b;}, 0);
            const tailRatio = Math.abs(totalFlow) > 0 ? tailFlow / totalFlow : 0;
            let tailScore = 10;
            let tailSignal = 'normal';
            
            if (tailFlow > 0 && tailRatio > 0.2) {
                tailScore = 15;
                tailSignal = 'strong_tail';
            } else if (tailFlow < 0 && tailRatio < -0.3) {
                tailScore = 3;
                tailSignal = 'tail_selloff';
            }
            
            // 综合评分
            const totalScore = Math.round(netFlowScore + activeScore + densityScore + waveScore + tailScore);
            
            // 3. 净流入速度（最近30分钟）
            const recent30 = minuteFlows.slice(-30).reduce(function(a,b){return a+b;}, 0);
            const prev30 = minuteFlows.slice(-60, -30).reduce(function(a,b){return a+b;}, 0);
            const flowSpeed = recent30 / 10000 / 30; // 万元/分钟
            const flowTrend = recent30 > prev30 ? 'up' : (recent30 < prev30 ? 'down' : 'flat');
            
            // 4. 波形类型文字
            const waveTypeText = {
                'accumulation': '阶梯型（吸筹）',
                'steady': '持续流入（建仓）',
                'exhaustion': '脉冲-衰竭',
                'distribution': '派发',
                'neutral': '中性震荡'
            };
            
            // 5. 异动时段提取
            let alertInfo = null;
            if (densityClusters.length > 0) {
                const biggest = densityClusters.reduce(function(a,b){return a.amount > b.amount ? a : b;});
                const startHour = 9 + Math.floor((biggest.start + 30) / 60);
                const startMin = (biggest.start + 30) % 60;
                const endHour = 9 + Math.floor((biggest.end + 30) / 60);
                const endMin = (biggest.end + 30) % 60;
                const timeStr = String(startHour).padStart(2,'0') + ':' + String(startMin).padStart(2,'0') + '-' + 
                               String(endHour).padStart(2,'0') + ':' + String(endMin).padStart(2,'0');
                const dirText = biggest.direction > 0 ? '主力主买' : '主力主卖';
                alertInfo = {
                    time: timeStr,
                    direction: biggest.direction,
                    type: dirText,
                    amount: biggest.amount,
                    count: biggest.count
                };
            }
            
            return {
                score: totalScore,
                activeRatio: activeRatio,
                density: maxDensity,
                densityLevel: maxDensity > 500 ? 'high' : (maxDensity > 100 ? 'medium' : 'low'),
                flowSpeed: flowSpeed,
                flowTrend: flowTrend,
                waveType: waveType,
                waveTypeText: waveTypeText[waveType],
                tailSignal: tailSignal,
                netInflow: netInflow,
                totalAmount: totalAmount,
                alertInfo: alertInfo
            };
        }

            // 注意：API返回profit(涨跌幅%)，不是changepercent
            const changePercent = parseFloat((title.profit || title.changepercent || '0').replace('%', '')) || 0;
            const isUp = changePercent >= 0;
            
            document.getElementById("stockName").textContent = stockName;
            document.getElementById("stockCode").textContent = currentCode;
            document.getElementById("priceInfo").style.display = "flex";
            document.getElementById("currentPrice").textContent = currentPrice.toFixed(2);
            document.getElementById("currentPrice").className = "current-price " + (isUp ? "price-up" : "price-down");
            document.getElementById("changePercent").textContent = (isUp ? "+" : "") + changePercent.toFixed(2) + "%";
            document.getElementById("changePercent").className = "change-percent " + (isUp ? "change-up" : "change-down");
            
            const trades = data.list || [];

            // 从逐笔明细按100万阈值分类计算
            // 主买=大单买(>100万且买方主动) 主卖=大单卖(>100万且卖方主动)
            // 被买=小单卖(≤100万且卖方主动，即被动承接大单买方) 被卖=小单买(≤100万且买方主动)
            const THRESHOLD = 1000000; // 100万
            let mainBuy = 0, mainSell = 0, beiBuy = 0, beiSell = 0;
            trades.forEach(function(t) {
                const isBuy = t.tradetype === "1" || t.tradetype === 1;
                let amount = 0;
                if (t.money && !isNaN(t.money)) {
                    amount = parseFloat(t.money);
                } else if (t.value) {
                    amount = parseFloat(String(t.value).replace(/[^\d.]/g, '')) * 10000;
                }
                const isLarge = amount >= THRESHOLD;
                if (isBuy) {
                    if (isLarge) mainBuy += amount;  // 大单买：主力主动买
                    else beiSell += amount;           // 小单买：被动承接大单卖方
                } else {
                    if (isLarge) mainSell += amount;  // 大单卖：主力主动卖
                    else beiBuy += amount;            // 小单卖：被动承接大单买方
                }
            });
            const netInflow = mainBuy - mainSell;
            document.getElementById("statsRow").style.display = "grid";
            document.getElementById("netInflow").textContent = (netInflow >= 0 ? "+" : "") + formatMoney(netInflow);
            document.getElementById("netInflow").className = "stat-value " + (netInflow >= 0 ? "positive" : "negative");
            document.getElementById("buyAmount").textContent = formatMoney(mainBuy);
            document.getElementById("sellAmount").textContent = formatMoney(mainSell);
            document.getElementById("tradeCount").textContent = trades.length + "笔";
            
            renderScatterChart(trades);
            renderFlowChart(data.pricechange || []);
            renderCumulativeChart(data.pricechange || []);
            renderFundCategoryChart(trades);
            renderTradeList(trades);
            
            // 渲染主力动态分析面板
            const smMetrics = computeSmartMoneyMetrics(trades, data.pricechange || []);
            renderSmartMoneyPanel(smMetrics);
        }
        
        init();
    </script>
</body>
</html>
