<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI事件驱动投研系统</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  *, :root { --bg:#0d1117;--card:#161b22;--card-h:#1c2129;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--up:#f85149;--down:#3fb950;--orange:#d29922;--purple:#bc8cff; --red:#f85149;--green:#3fb950; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .header { background:var(--card); border-bottom:1px solid var(--border); padding:13px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; gap:16px; }
  .header-left { display:flex; align-items:center; gap:10px; }
  .header h1 { font-size:20px; font-weight:700; display:flex; align-items:center; gap:8px; white-space:nowrap; }
  .h1-tag { color:var(--orange); }
  .market-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:4px; }
  .market-dot.open { background:#3fb950; box-shadow:0 0 6px #3fb950; animation:pulse 2s infinite; }
  .market-dot.closed { background:#8b949e; }
  .market-dot.holiday { background:#d29922; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .market-label { font-size:14px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  .market-session { font-size:12px; padding:2px 8px; border-radius:3px; }
  .market-session.morning,.market-session.afternoon { background:rgba(63,185,80,.12); color:var(--green); }
  .market-session.closed,.market-session.lunch,.market-session.holiday { background:rgba(139,148,158,.1); color:var(--muted); }
  .header-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .badge { background:rgba(210,153,34,.12); color:var(--orange); padding:3px 10px; border-radius:4px; font-size:14px; }
  .update-time { font-size:14px; color:var(--muted); white-space:nowrap; }
  .refresh-btn { background:var(--card); border:1px solid var(--border); color:var(--text); padding:8px 16px; border-radius:6px; cursor:pointer; font-size:15px; transition:.2s; }
  .refresh-btn:hover { border-color:var(--accent); color:var(--accent); }
  .refresh-btn:disabled { opacity:.5; pointer-events:none; }

  .layout { display:flex; height:calc(100vh - 57px); overflow:hidden; }

  /* Left panel */
  .panel-left { width:380px; min-width:300px; border-right:1px solid var(--border); overflow-y:auto; padding:12px; }
  .date-group { margin-bottom:14px; }
  .date-label { font-size:12px; color:var(--muted); padding:0 4px; margin-bottom:6px; font-weight:500; }
  .theme-card { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:12px 14px; margin-bottom:6px; cursor:pointer; transition:.15s; }
  .theme-card:hover { background:var(--card-h); border-color:#484f58; }
  .theme-card.active { border-color:var(--accent); background:rgba(88,166,255,.07); }
  .theme-card.continuous { border-color:rgba(88,166,255,.4); background:linear-gradient(135deg,rgba(88,166,255,.05),transparent); }
  .theme-card.continuous.active { border-color:var(--accent); }
  .trend-arrow { font-size:11px; margin-left:4px; font-weight:700; }
  .trend-up { color:var(--up); }
  .trend-down { color:var(--down); }
  .theme-top { display:flex; align-items:center; gap:5px; margin-bottom:3px; }
  .theme-name { font-size:15px; font-weight:700; flex:1; display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
  .theme-name-text { max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hot-tag { font-size:11px; background:rgba(248,81,73,.15); color:var(--red); padding:2px 6px; border-radius:3px; font-weight:600; }
  .cont-tag { font-size:11px; background:rgba(88,166,255,.12); color:var(--accent); padding:2px 6px; border-radius:3px; font-weight:600; margin-left:4px; }
  .new-tag { font-size:11px; background:rgba(63,185,80,.12); color:var(--green); padding:2px 6px; border-radius:3px; font-weight:600; margin-left:4px; }
  .f3-badge { font-size:14px; font-weight:800; font-family:'SF Mono',Consolas,monospace; flex-shrink:0; }
  .f3.up{color:var(--up)} .f3.down{color:var(--down)} .f3.flat{color:var(--muted)}
  .theme-sort-bar { padding:6px 10px; display:flex; align-items:center; gap:5px; border-bottom:1px solid var(--border); background:var(--card); position:sticky; top:0; z-index:10; }
  .theme-sort-bar .sort-label { font-size:11px; color:var(--muted); }
  .theme-title { font-size:12px; color:var(--text); line-height:1.35; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; margin-bottom:3px; font-weight:500; }
  .theme-summary { font-size:12px; color:var(--muted); line-height:1.35; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .theme-tags { display:flex; gap:5px; flex-wrap:wrap; }
  .tag{font-size:11px;padding:2px 6px;border-radius:3px}
  .tag-reason{background:rgba(188,140,255,.12);color:var(--purple)}
  .tag-stocks{background:rgba(63,185,80,.12);color:var(--green)}

  /* Middle panel - stock list */
  .panel-mid { width:680px; min-width:520px; border-right:1px solid var(--border); overflow-y:auto; padding:10px 14px; }
  .panel-mid.empty { display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:14px; }

  /* Right panel - mindmap */
  .panel-right { flex:1; min-width:350px; overflow:hidden; background:#0d1117; position:relative; }
  .panel-right.empty { display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:14px; }
  .mindmap-canvas { width:100%; height:100%; }
  .mindmap-title { position:absolute; top:14px; left:50%; transform:translateX(-50%); color:var(--muted); font-size:14px; pointer-events:none; z-index:10; }
  .mindmap-tip { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); color:var(--muted); font-size:12px; pointer-events:none; z-index:10; opacity:.6; }

  .back-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:14px; padding:4px 0; margin-bottom:12px; }
  .back-btn:hover{text-decoration:underline}

  /* Stock header */
  .stock-header { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
  .stock-title-wrap { flex:1; min-width:0; }
  .stock-title { font-size:20px; font-weight:700; margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .stock-meta { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); flex-wrap:wrap; }
  .meta-badge { padding:2px 8px; border-radius:4px; font-size:12px; }
  .meta-badge.blue{background:rgba(88,166,255,.1);color:var(--accent)}
  .meta-badge.red{background:rgba(248,81,73,.1);color:var(--red)}
  .meta-badge.green{background:rgba(63,185,80,.1);color:var(--green)}
  .meta-badge.orange{background:rgba(210,153,34,.1);color:var(--orange)}
  .stock-actions { display:flex; gap:6px; flex-shrink:0; align-items:center; }
  .action-btn { background:var(--card); border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:5px; cursor:pointer; font-size:13px; transition:.2s; display:flex; align-items:center; gap:4px; }
  .action-btn:hover{border-color:var(--accent);color:var(--accent)}
  .action-btn.primary{background:rgba(88,166,255,.12);border-color:var(--accent);color:var(--accent)}
  .action-btn.primary:hover{background:rgba(88,166,255,.2)}
  .action-btn:disabled{opacity:.4;pointer-events:none}
  .fav-star{font-size:13px;cursor:pointer;user-select:none;transition:.2s;margin-left:3px}
  .fav-star:hover{transform:scale(1.3)}
  .fav-star.saved{color:var(--orange)}

  .sort-bar { display:flex; align-items:center; gap:4px; margin-bottom:6px; flex-wrap:wrap; }
  .sort-label{font-size:13px;color:var(--muted);margin-right:2px}
  .sort-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:13px;transition:.2s}
  .sort-btn:hover{border-color:var(--accent);color:var(--text)}
  .sort-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(88,166,255,.08)}
  .sort-arrow{margin-left:1px;font-size:10px}

  .stock-table { width:100%; border-collapse:collapse; font-size:14px; }
  .stock-table th{text-align:left;padding:6px 8px;font-size:12px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);white-space:nowrap;z-index:10}
  .stock-table th.ck{width:26px}
  .stock-table td.ck{text-align:center}
  .stock-table td.ck input{accent-color:var(--accent);cursor:pointer;width:13px;height:13px}
  .stock-table th.n{text-align:right;width:32px}
  .stock-table th.name{min-width:85px}
  .stock-table th.code{min-width:82px}
  .stock-table th.price{text-align:right;width:70px}
  .stock-table th.chg{text-align:right;width:78px}
  .stock-table th.hs{text-align:right;width:65px}
  .stock-table th.flow{text-align:right;width:82px}
  .stock-table th.sector{min-width:85px}
  .stock-table td{padding:6px 8px;border-bottom:1px solid rgba(48,54,61,.35);vertical-align:middle}
  .stock-table td.n{text-align:right;color:var(--muted);font-size:13px}
  .stock-table td.name{font-weight:600;cursor:pointer;white-space:nowrap;font-size:14px}
  .stock-table td.name:hover{color:var(--accent);text-decoration:underline}
  .stock-table td.code{color:var(--muted);font-size:13px;font-family:'SF Mono',Consolas,monospace}
  .stock-table td.price{text-align:right;font-family:'SF Mono',Consolas,monospace;font-size:14px}
  .stock-table td.chg{text-align:right;font-weight:700;font-family:'SF Mono',Consolas,monospace;font-size:14px}
  .stock-table td.chg.up{color:var(--up)}
  .stock-table td.chg.down{color:var(--down)}
  .stock-table td.chg.flat{color:var(--muted)}
  .stock-table td.hs{text-align:right;font-family:'SF Mono',Consolas,monospace;font-size:13px}
  .stock-table td.flow{text-align:right;font-family:'SF Mono',Consolas,monospace;font-size:13px}
  .stock-table td.flow.in{color:var(--red)}
  .stock-table td.flow.out{color:var(--green)}
  .stock-table td.sector{font-size:13px;color:var(--muted)}
  .stock-table tr:hover td{background:rgba(255,255,255,.02)}
  .stock-table tr.fav-row td{background:rgba(210,153,34,.04)}
  .stock-table tr.fav-row:hover td{background:rgba(210,153,34,.07)}
  .stock-table tr.highlight-row td{background:rgba(88,166,255,.08)}
  .resonate-ind{display:inline-block;font-size:12px;background:rgba(210,153,34,.12);color:var(--orange);padding:2px 5px;border-radius:3px;margin-left:5px}
  .reason-row td{border:none;padding:0 8px 6px 8px}
  .reason-row:hover td{background:transparent}
  .reason-tags{display:flex;flex-wrap:wrap;gap:3px}
  .reason-tag{font-size:12px;padding:2px 6px;border-radius:3px;background:rgba(188,140,255,.1);color:#bc8cff}

  .tooltip{position:fixed;z-index:9999;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:14px;color:var(--text);pointer-events:none;display:none;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .tooltip-name{font-weight:700;font-size:15px;margin-bottom:8px}
  .tooltip-row{display:flex;justify-content:space-between;gap:20px;padding:3px 0}
  .tooltip-key{color:var(--muted)}
  .tooltip-val{font-family:'SF Mono',Consolas,monospace}
  .tooltip-val.red{color:var(--red)}
  .tooltip-val.green{color:var(--green)}
  .error-msg{text-align:center;padding:50px;color:var(--muted);font-size:15px}
  .err-detail{font-size:12px;margin-top:8px;color:var(--red);font-family:monospace;word-break:break-all}
  .loading-wrap{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);gap:10px;font-size:15px}
  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:8px;font-size:15px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}

  @media(max-width:1200px){
    .layout{flex-direction:column}
    .panel-left{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:40vh}
    .panel-mid{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:35vh}
    .panel-right{min-height:300px}
  }
  @media(max-width:768px){
    .layout{flex-direction:column}
    .panel-left{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:45vh}
    .panel-mid{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:35vh}
    .panel-right{min-height:250px}
    .back-btn{display:inline-block}
    .header{padding:12px 16px}
    .panel-left{padding:10px}
    .panel-mid{padding:12px}
    .stock-table th.hs,.stock-table td.hs,.stock-table th.flow,.stock-table td.flow,.stock-table th.sector,.stock-table td.sector{display:none}
    .h1-tag span,.badge,.update-time{display:none}
  }
/* ── Modal ── */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;display:none}
.modal-content{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(30,30,45,.7);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);padding:20px;border-radius:8px;width:90%;max-width:1000px;max-height:80vh;overflow:auto;border:1px solid #3a3a5a;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.modal-close{position:absolute;top:10px;right:15px;cursor:pointer;color:#aaa;font-size:24px;z-index:10}
.modal-close:hover{color:#fff}
.modal-iframe{width:100%;height:calc(80vh - 60px);border:none;border-radius:4px;background:#fff}

/* ── Right panel view tabs ── */
.view-tabs{position:absolute;top:8px;right:12px;z-index:20;display:flex;gap:4px}
.view-tab{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:4px;cursor:pointer;font-size:13px;transition:.2s}
.view-tab:hover{border-color:var(--accent);color:var(--text)}
.view-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(88,166,255,.1)}
.scatter-container{width:100%;height:100%;display:none}
.scatter-container.active{display:block}
.heatmap-container{width:100%;height:100%;display:none;position:relative;overflow:hidden}
.heatmap-container.active{display:block}
.heatmap-chart{position:absolute;top:0;left:0;width:100%;height:100%;display:block;}
.mindmap-canvas.hidden{display:none}

</style>
<script src="https://cdn.jsdelivr.net/npm/echarts@4.8.0/dist/echarts.min.js"></script>
</head>
<body>

<!-- Modal -->
<div id="stockModal" class="modal-overlay">
  <div class="modal-content">
    <span class="modal-close">&times;</span>
    <iframe id="stockModalFrame" class="modal-iframe"></iframe>
  </div>
</div>

<header class="header">
  <div class="header-left">
    <h1>🔮 <span class="h1-tag">AI事件驱动投研系统</span></h1>
    <span class="market-label">
      <span class="market-dot closed" id="mDot"></span>
      <span id="mText">检测中…</span>
      <span class="market-session closed" id="mSession"></span>
    </span>
  </div>
  <div class="header-right">
    <span class="badge">东方财富数据</span>
    <span class="update-time" id="updateTime"></span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadThemes()">刷新</button>
  </div>
</header>

<div class="layout">
  <div class="panel-left" id="panelLeft">
    <div class="loading-wrap"><div class="spinner"></div>加载中...</div>
  </div>
  <div class="panel-mid empty" id="panelMid">👈 点击左侧板块查看成分股</div>
  <div class="panel-right empty" id="panelRight">
    <div class="view-tabs">
      <button class="view-tab active" id="tabMindmap" onclick="switchRightView('mindmap')">🧠 脑图</button>
      <button class="view-tab" id="tabScatter" onclick="switchRightView('scatter')">📊 散点图</button>
      <button class="view-tab" id="tabHeatmap" onclick="switchRightView('heatmap')">🔥 热力图</button>
    </div>
    <div class="mindmap-title" id="mindmapTitle">概念脑图</div>
    <canvas class="mindmap-canvas" id="mindmapCanvas"></canvas>
    <div class="mindmap-tip" id="mindmapTip">拖拽可移动</div>
    <div class="scatter-container" id="scatterContainer"></div>
    <div class="heatmap-container" id="heatmapContainer"><div id="heatmapChart" class="heatmap-chart"></div></div>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-name" id="ttName"></div>
  <div class="tooltip-row"><span class="tooltip-key">现价</span><span class="tooltip-val" id="ttPrice">—</span></div>
  <div class="tooltip-row"><span class="tooltip-key">换手率</span><span class="tooltip-val" id="ttHs">—</span></div>
  <div class="tooltip-row"><span class="tooltip-key">主力净流入</span><span class="tooltip-val" id="ttFlow">—</span></div>
  <div class="tooltip-row"><span class="tooltip-key">流通市值</span><span class="tooltip-val" id="ttCap">—</span></div>
  <div class="tooltip-row"><span class="tooltip-key">所属板块</span><span class="tooltip-val" id="ttSec">—</span></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─── API Config ─────────────────────────────────────────
const API = 'https://emcfgdata.eastmoney.com/api/themeInvest';
const AUTH_WAP = { client:'wap', clientType:'cfw', clientVersion:'9001', randomCode:'16876811901271687682191741603920693', timestamp:'1741603920693' };
const AUTH_WEB = { client:'web', clientType:'cfw', clientVersion:'8.3', randomCode:'CZ7odv3YipURcVif' };

// ─── State ─────────────────────────────────────────────
let allThemes = [];
let stockCache = {};
let favorites = JSON.parse(localStorage.getItem('dc_fav') || '{}');
let currentCode = null;
let currentSort = { field:'f3', asc:false };
let themeSort = { field:'default', asc:false }; // default | fex3 | cumulateF3
let overlapMap = {};

// ─── Market session ─────────────────────────────────────
function getSession() {
  const now = new Date();
  const d = new Date(now.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }));
  const day = d.getDay(), h = d.getHours(), m = d.getMinutes();
  const mins = h * 60 + m;
  if (day === 0 || day === 6) return 'holiday';
  if (mins >= 9*60+15 && mins < 11*60+30) return 'morning';
  if (mins >= 11*60+30 && mins < 13*60) return 'lunch';
  if (mins >= 13*60 && mins < 15*60) return 'afternoon';
  return 'closed';
}

function updateMarketUI() {
  const s = getSession();
  const dot = document.getElementById('mDot');
  const txt = document.getElementById('mText');
  const ses = document.getElementById('mSession');
  if (s === 'holiday') {
    dot.className = 'market-dot holiday'; txt.textContent = '周末休市';
    ses.className = 'market-session holiday'; ses.textContent = '';
  } else if (s === 'closed') {
    dot.className = 'market-dot closed'; txt.textContent = '已休市';
    ses.className = 'market-session closed'; ses.textContent = '';
  } else if (s === 'lunch') {
    dot.className = 'market-dot closed'; txt.textContent = '午间休市';
    ses.className = 'market-session lunch'; ses.textContent = '午休';
  } else {
    dot.className = 'market-dot open'; txt.textContent = '交易中';
    ses.className = `market-session ${s}`;
    ses.textContent = s === 'morning' ? '早盘' : '午盘';
  }
}
updateMarketUI();
setInterval(updateMarketUI, 30000);

// ─── Load themes ────────────────────────────────────────
async function loadThemes(silent = false) {
  const btn = document.getElementById('refreshBtn');
  const panel = document.getElementById('panelLeft');
  if (!silent) {
    btn.disabled = true; btn.textContent = '刷新中…';
    panel.innerHTML = '<div class="loading-wrap"><div class="spinner"></div>加载中...</div>';
  }

  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 10000);
    const res = await fetch(`${API}/getFryTomorrowList`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ args:{ pageSize:50, lastTradeDate:'' }, ...AUTH_WAP }),
      signal: ctrl.signal
    });
    clearTimeout(timer);
    const json = await res.json();
    if (json.code === 0 && json.data) {
      allThemes = json.data;
      buildOverlapMap();
      renderThemeList();
      document.getElementById('updateTime').textContent = `更新 ${new Date().toLocaleTimeString('zh-CN')}`;
    } else {
      throw new Error(`错误码 ${json.code} ${json.message||''}`);
    }
  } catch (e) {
    const msg = e.name === 'AbortError' ? '请求超时(10s)，可能被CORS阻止，请通过http://localhost访问' : e.message;
    if (!silent) {
      panel.innerHTML = `<div class="error-msg">加载失败<div class="err-detail">${msg}</div></div>`;
    }
    console.error('[loadThemes]', e);
  } finally {
    btn.disabled = false; btn.textContent = '刷新';
  }
}

function buildOverlapMap() {
  overlapMap = {};
  allThemes.forEach(t => {
    (t.stockList||[]).forEach(s => {
      const c = s.code||'';
      overlapMap[c] = (overlapMap[c]||0)+1;
    });
  });
}

// ─── Render theme list ──────────────────────────────────
function renderThemeList() {
  const panel = document.getElementById('panelLeft');
  if (!allThemes.length) { panel.innerHTML='<div class="error-msg">暂无数据</div>'; return; }

  // 排序控制条
  const sortBar = `
    <div class="theme-sort-bar">
      <span class="sort-label">排序：</span>
      <button class="sort-btn${themeSort.field==='default'?' active':''}" onclick="changeThemeSort('default')">默认</button>
      <button class="sort-btn${themeSort.field==='fex3'?' active':''}" onclick="changeThemeSort('fex3')">延续性<span class="sort-arrow">${themeSort.field==='fex3'?(themeSort.asc?'▲':'▼'):''}</span></button>
      <button class="sort-btn${themeSort.field==='cumulateF3'?' active':''}" onclick="changeThemeSort('cumulateF3')">累计涨幅<span class="sort-arrow">${themeSort.field==='cumulateF3'?(themeSort.asc?'▲':'▼'):''}</span></button>
    </div>
  `;

  const groups = {};
  let sortedThemes = [...allThemes];
  
  // 排序逻辑
  if (themeSort.field === 'fex3') {
    sortedThemes.sort((a,b) => (themeSort.asc ? 1 : -1) * ((b.fex3||0) - (a.fex3||0)));
  } else if (themeSort.field === 'cumulateF3') {
    sortedThemes.sort((a,b) => (themeSort.asc ? 1 : -1) * ((b.cumulateF3||0) - (a.cumulateF3||0)));
  }
  
  sortedThemes.forEach(t => {
    const d = t.tradeDate||'未知';
    if (!groups[d]) groups[d] = [];
    groups[d].push(t);
  });

  let html = sortBar;
  Object.keys(groups).sort().reverse().forEach(date => {
    html += `<div class="date-group"><div class="date-label">📅 ${date}</div>`;
    groups[date].forEach(t => {
      const f3 = t.f3||0;
      const f3cls = f3>0?'up':f3<0?'down':'flat';
      const f3sign = f3>0?'+':'';
      const hot = t.isHot?'<span class="hot-tag">HOT</span>':'';
  const cont = t.fex3>=2?`<span class="cont-tag">🔥${t.fex3}连</span>`:'';
  const newTag = t.isNew?'<span class="new-tag">NEW</span>':'';
  // 计算K线5日趋势
  const klist = t.kLineList||[];
  let trendArrow = '';
  let trendUp = false;
  if (klist.length >= 5) {
    const last5 = klist.slice(-5);
    const first = last5[0], last = last5[last5.length-1];
    trendUp = last > first;
    trendArrow = trendUp ? '<span class="trend-arrow trend-up">↗</span>' : '<span class="trend-arrow trend-down">↘</span>';
  }
  const cardCls = `theme-card${currentCode===t.themeCode?' active':''}${t.fex3>=2?' continuous':''}`;
      const shortName = (t.themeName||'').length>14?(t.themeName||'').slice(0,14)+'…':(t.themeName||'');
      const reasonCnt = t.reasonCount||(t.keywordList&&t.keywordList.length)||0;
      const stocks = t.stockList||[];
      html += `
        <div class="${cardCls}" data-code="${esc(t.themeCode)}" onclick="selectTheme('${esc(t.themeCode)}',this)">
          <div class="theme-top">
            <div class="theme-name"><span class="theme-name-text">${esc(shortName)}</span>${hot}${cont}${newTag}</div>
            <span class="f3-badge ${f3cls}" style="color:var(--${f3cls==='up'?'up':f3cls==='down'?'down':'muted'})">${f3sign}${f3.toFixed(2)}%${trendArrow}</span>
          </div>
          ${t.title?`<div class="theme-title">${esc(t.title)}</div>`:''}
          <div class="theme-summary">${esc(t.summary||'')}</div>
          <div class="theme-tags">
            ${reasonCnt?`<span class="tag tag-reason">入选理由 ${reasonCnt}</span>`:''}
          </div>
        </div>`;
    });
    html += '</div>';
  });
  panel.innerHTML = html;
}

// ─── Select theme ───────────────────────────────────────
async function selectTheme(code, el) {
  if (window.innerWidth <= 768) document.querySelector('.panel-left').style.display = 'none';
  document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentCode = code;

  const theme = allThemes.find(t => t.themeCode === code);
  const panel = document.getElementById('panelMid');
  panel.classList.remove('empty');

  // Show loading state
  panel.innerHTML = `
    <div class="loading-wrap"><div class="spinner"></div>加载成分股...</div>`;

  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 10000);
    const res = await fetch(`${API}/getStockList`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        args:{ themeCode:code, pageSize:1000, pageNum:1, sort:-1, sortField:'f3' },
        ...AUTH_WEB, timestamp: Date.now()
      }),
      signal: ctrl.signal
    });
    clearTimeout(timer);
    const json = await res.json();
    if (json.code === 0 && json.data) {
      stockCache[code] = json.data.stockList || [];
      // Render full panel
      panel.innerHTML = buildPanelHtml(theme, stockCache[code], json.data.statistic || {});
      // 渲染脑图
      renderMindmap(theme, stockCache[code]);
      if (currentRightView === "scatter") {
        renderScatterChart(theme, stockCache[code]);
      } else if (currentRightView === "heatmap") {
        renderHeatmapChart(theme, stockCache[code]);
      }
      // bind table interactions (hover/click)
      bindTableInteractions();
    } else {
      throw new Error(`错误码 ${json.code} ${json.message||''}`);
    }
  } catch (e) {
    panel.innerHTML = `
      <div class="error-msg">成分股加载失败<div class="err-detail">${e.message}</div></div>`;
  }
}

// ─── Build panel HTML ───────────────────────────────────
function buildPanelHtml(theme, list, stat) {
  const themeName = theme?.themeName || currentCode || '';
  const isFav = (code) => favorites[code] === currentCode;

  // Sort
  const sorted = sortStocks([...list], currentSort.field, currentSort.asc);
  const favStocks = sorted.filter(s => isFav(s.securityCode||s.code));
  const others = sorted.filter(s => !isFav(s.securityCode||s.code));
  const ordered = [...favStocks, ...others];
  window._sortedStocks = ordered; // save display-order list for tooltip

  let rows = '';
  ordered.forEach((s) => {
    const name = s.securityName||s.name||'—';
    const code = s.securityCode||s.code||'—';
    const price = s.f2!=null?parseFloat(s.f2).toFixed(2):'—';
    const f3 = s.f3!=null?parseFloat(s.f3):0;
    const f3cls = f3>0?'up':f3<0?'down':'flat';
    const f3sign = f3>0?'+':'';
    const hs = s.f8!=null?(parseFloat(s.f8)/100).toFixed(2)+'%':'—';
    const flow = s.f62??0;
    const flowStr = Math.abs(flow)>=1e8?(flow/1e8).toFixed(2)+'亿':Math.abs(flow)>=1e4?(flow/1e4).toFixed(0)+'万':flow.toFixed(0);
    const flowCls = flow>0?'in':flow<0?'out':'';
    const flowSign = flow>0?'+':flow<0?'-':'';
    const sector = s.f100||'';
    const reasons = (s.keywordList||[]).map(k=>`<span class="reason-tag">${esc(k.introduction||'')}</span>`).join('');
    const isFavRow = isFav(code);
    const origIdx = sorted.indexOf(s)+1;
    const overlap = overlapMap[code]||0;
    const resonate = overlap>1?`<span class="resonate-ind" title="出现在 ${overlap} 个板块">共振${overlap}</span>`:'';

    const rowIdx = ordered.indexOf(s);
    const ckChecked = selectedStocks.has(code) ? 'checked' : '';
    rows += `<tr class="stock-row ${isFavRow?'fav-row':''}" data-idx="${rowIdx}" data-code="${esc(code)}">
      <td class="ck"><input type="checkbox" class="stock-ck" data-code="${esc(code)}" data-name="${esc(name)}" ${ckChecked} onchange="onStockCk(this)"></td>
      <td class="n">${origIdx}</td>
      <td class="name" onmouseenter="showTooltip(event,this)" onmouseleave="hideTooltip()" onclick="openStockModal('smart_money.html##${code}##')">
        ${esc(name)}${resonate}
        <span class="fav-star ${isFavRow?'saved':''}" onclick="event.stopPropagation();toggleFav('${esc(code)}')">${isFavRow?'★':'☆'}</span>
      </td>
      <td class="code">${esc(code)}</td>
      <td class="price">${price}</td>
      <td class="chg ${f3cls}">${f3sign}${f3.toFixed(2)}%</td>
      <td class="hs">${hs}</td>
      <td class="flow ${flowCls}">${flow===0?'—':flowSign+flowStr}</td>
      <td class="sector">${esc(sector)}</td>
    </tr>
    ${reasons?`<tr class="${isFavRow?'fav-row':''}"><td colspan="8" class="reason-row"><div class="reason-tags">${reasons}</div></td></tr>`:''}`;
  });

  // 根据A股规则判断涨停/跌停
  function getLimit(code) {
    const c = String(code || '');
    if (/^(30|68)/.test(c)) return 20;   // 创业板/科创板 ±20%
    if (c.startsWith('4') || c.startsWith('8')) return 20;  // 北交所等
    // ST股判断：名称含ST/*ST，阈值±5%
    return 10;  // 主板/中小板 默认±10%
  }
  const limitUp = list.filter(s => (s.f3||0) >= getLimit(s.securityCode||s.code) - 0.01).length;
  const limitDown = list.filter(s => (s.f3||0) <= -(getLimit(s.securityCode||s.code)) + 0.01).length;

  const statBadges = [
    stat.f3!=null?`<span class="meta-badge ${stat.f3>0?'red':'green'}">板块涨跌 ${stat.f3>0?'+':''}${stat.f3.toFixed(2)}%</span>`:'',
    stat.fex5!=null&&stat.fex5!==0?`<span class="meta-badge ${stat.fex5>0?'red':'green'}">主力净流入 ${Math.abs(stat.fex5/1e8).toFixed(2)}亿</span>`:'',
  ].filter(Boolean).join('');

  return `
    <div class="stock-header">
      <div class="stock-title-wrap">
        <div class="stock-title">${esc(themeName)} <span style="font-size:13px;font-weight:400;color:var(--muted)">${esc(currentCode||'')}</span></div>
        <div class="stock-meta">
          <span class="meta-badge blue">${list.length} 只成分股</span>
          ${statBadges}
        </div>
      </div>
      <div class="stock-actions">
        <button class="action-btn primary" id="compareBtn" onclick="openCompare()" disabled>📊 多股同列 (<span id="selCount">0</span>)</button>
        <button class="action-btn" onclick="toggleThemeFav()"><span id="themeFavBtn">☆</span> 收藏</button>
        <button class="action-btn" onclick="copyCodes()">📋 复制代码</button>
        <button class="action-btn" onclick="exportCsv()">⬇ CSV</button>
      </div>
    </div>
    <div class="sort-bar">
      <span class="sort-label">排序：</span>
      <button class="sort-btn${currentSort.field==='f3'?' active':''}" onclick="changeSort('f3')">涨跌幅<span class="sort-arrow">${currentSort.field==='f3'?(currentSort.asc?'▲':'▼'):''}</span></button>
      <button class="sort-btn${currentSort.field==='f8'?' active':''}" onclick="changeSort('f8')">换手率<span class="sort-arrow">${currentSort.field==='f8'?(currentSort.asc?'▲':'▼'):''}</span></button>
      <button class="sort-btn${currentSort.field==='f62'?' active':''}" onclick="changeSort('f62')">主力净流入<span class="sort-arrow">${currentSort.field==='f62'?(currentSort.asc?'▲':'▼'):''}</span></button>
      <button class="sort-btn${currentSort.field==='f21'?' active':''}" onclick="changeSort('f21')">流通市值<span class="sort-arrow">${currentSort.field==='f21'?(currentSort.asc?'▲':'▼'):''}</span></button>
      <button class="sort-btn${currentSort.field==='rank'?' active':''}" onclick="changeSort('rank')">综合排名<span class="sort-arrow">${currentSort.field==='rank'?(currentSort.asc?'▲':'▼'):''}</span></button>
    </div>
    <table class="stock-table">
      <thead>
        <tr><th class="ck"><input type="checkbox" id="ckAll" onchange="toggleAllCk(this.checked)" title="全选/取消"></th><th class="n">#</th><th class="name">股票名称</th><th class="code">代码</th><th class="price">现价</th><th class="chg">涨跌幅</th><th class="hs">换手率</th><th class="flow">主力净流入</th><th class="sector">所属板块</th></tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ─── Sorting ────────────────────────────────────────────
function changeSort(field) {
  if (currentSort.field === field) {
    currentSort.asc = !currentSort.asc;
  } else {
    currentSort.field = field;
    currentSort.asc = false;
  }
  rerender();
}

function changeThemeSort(field) {
  if (themeSort.field === field) {
    themeSort.asc = !themeSort.asc;
  } else {
    themeSort.field = field;
    themeSort.asc = false;
  }
  renderThemeList();
}

function sortStocks(list, field, asc) {
  return list.sort((a, b) => {
    let av = a[field] ?? 0, bv = b[field] ?? 0;
    return asc ? (av - bv) : (bv - av);
  });
}

function rerender() {
  if (!currentCode || !stockCache[currentCode]) return;
  const theme = allThemes.find(t => t.themeCode === currentCode);
  const panel = document.getElementById('panelMid');
  if (panel) panel.innerHTML = buildPanelHtml(theme, stockCache[currentCode], {});
  // 更新脑图
  renderMindmap(theme, stockCache[currentCode]);
  // Re-bind table interactions after re-render
  bindTableInteractions();
}

// ─── Chart / Table interaction helpers ─────────────────────────────────
function findDataIndexInChart(chart, code) {
  try {
    if (!chart || !chart.getOption) return -1;
    const opt = chart.getOption();
    if (!opt || !opt.series || !opt.series.length) return -1;
    const data = opt.series[0].data || [];
    for (let i = 0; i < data.length; i++) {
      const d = data[i];
      if (!d) continue;
      if (d.code === code || d._code === code) return i;
      if (d.data && (d.data.code === code || d.data._code === code)) return i;
      if (d.name === code) return i;
    }
  } catch (e) { /* ignore */ }
  return -1;
}

function clearHighlights() {
  try {
    if (hotspotScatterChart && !hotspotScatterChart.isDisposed()) {
      const opt = hotspotScatterChart.getOption();
      const len = (opt && opt.series && opt.series[0] && opt.series[0].data) ? opt.series[0].data.length : 0;
      for (let i = 0; i < len; i++) hotspotScatterChart.dispatchAction({ type: 'downplay', seriesIndex: 0, dataIndex: i });
      hotspotScatterChart.dispatchAction({ type: 'hideTip' });
    }
    if (hotspotHeatmapChart && !hotspotHeatmapChart.isDisposed()) {
      const opt2 = hotspotHeatmapChart.getOption();
      const len2 = (opt2 && opt2.series && opt2.series[0] && opt2.series[0].data) ? opt2.series[0].data.length : 0;
      for (let i = 0; i < len2; i++) hotspotHeatmapChart.dispatchAction({ type: 'downplay', seriesIndex: 0, dataIndex: i });
      hotspotHeatmapChart.dispatchAction({ type: 'hideTip' });
    }
  } catch (e) { /* ignore */ }
  document.querySelectorAll('.stock-table tr.highlight-row').forEach(r => r.classList.remove('highlight-row'));
}

function highlightTableRow(code) {
  if (!code) return;
  document.querySelectorAll('.stock-table tr.highlight-row').forEach(r => r.classList.remove('highlight-row'));
  const row = document.querySelector(`.stock-row[data-code="${code}"]`);
  if (row) {
    row.classList.add('highlight-row');
    try { row.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch (e) {}
  }
}

function syncStockInteraction(code, showTip) {
  if (!code) return;
  clearHighlights();
  // Scatter
  try {
    if (hotspotScatterChart && !hotspotScatterChart.isDisposed()) {
      const idx = findDataIndexInChart(hotspotScatterChart, code);
      if (idx >= 0) {
        hotspotScatterChart.dispatchAction({ type: 'highlight', seriesIndex: 0, dataIndex: idx });
        if (showTip) hotspotScatterChart.dispatchAction({ type: 'showTip', seriesIndex: 0, dataIndex: idx });
      }
    }
  } catch (e) { }
  // Heatmap
  try {
    if (hotspotHeatmapChart && !hotspotHeatmapChart.isDisposed()) {
      const idx2 = findDataIndexInChart(hotspotHeatmapChart, code);
      if (idx2 >= 0) {
        hotspotHeatmapChart.dispatchAction({ type: 'highlight', seriesIndex: 0, dataIndex: idx2 });
        if (showTip) hotspotHeatmapChart.dispatchAction({ type: 'showTip', seriesIndex: 0, dataIndex: idx2 });
      }
    }
  } catch (e) { }

  // Table
  highlightTableRow(code);
}

function bindTableInteractions() {
  document.querySelectorAll('.stock-row').forEach(row => {
    const code = row.dataset.code;
    row.onmouseenter = () => syncStockInteraction(code, true);
    row.onmouseleave = () => clearHighlights();
    row.onclick = () => { if (code) openStockModal('smart_money.html##' + code + '##'); };
  });
}

// ─── Favorites ──────────────────────────────────────────
function toggleFav(code) {
  if (favorites[code] === currentCode) delete favorites[code];
  else favorites[code] = currentCode;
  localStorage.setItem('dc_fav', JSON.stringify(favorites));
  rerender();
}

function toggleThemeFav() {
  if (!currentCode || !stockCache[currentCode]) return;
  const allFav = stockCache[currentCode].every(s => favorites[s.securityCode||s.code] === currentCode);
  stockCache[currentCode].forEach(s => {
    const c = s.securityCode||s.code;
    if (allFav) delete favorites[c]; else favorites[c] = currentCode;
  });
  localStorage.setItem('dc_fav', JSON.stringify(favorites));
  rerender();
}

// ─── Tooltip ────────────────────────────────────────────
function showTooltip(e, el) {
  const row = el.closest('tr');
  if (!row) return;
  const idx = parseInt(row.dataset.idx, 10);
  if (isNaN(idx)) return;
  const list = window._sortedStocks || stockCache[currentCode] || [];
  const s = list[idx];
  if (!s) return;

  const flow = s.f62 ?? 0;
  const flowStr = flow===0?'—':(Math.abs(flow)>=1e8?(flow/1e8).toFixed(2)+'亿':Math.abs(flow)>=1e4?(flow/1e4).toFixed(0)+'万':flow.toFixed(0));
  const flowCls = flow>0?'red':flow<0?'green':'';
  const flowSign = flow>0?'+':flow<0?'-':'';

  document.getElementById('ttName').textContent = s.securityName||s.name||'—';
  document.getElementById('ttPrice').textContent = s.f2!=null?parseFloat(s.f2).toFixed(2):'—';
  document.getElementById('ttHs').textContent = s.f8!=null?(parseFloat(s.f8)/100).toFixed(2)+'%':'—';
  const flowEl = document.getElementById('ttFlow');
  flowEl.textContent = flow===0?'—':flowSign+flowStr;
  flowEl.className = 'tooltip-val ' + flowCls;
  document.getElementById('ttCap').textContent = s.f21!=null?(s.f21>=1e8?(s.f21/1e8).toFixed(2)+'亿':(s.f21/1e4).toFixed(0)+'万'):'—';
  document.getElementById('ttSec').textContent = s.f100||'—';

  const tt = document.getElementById('tooltip');
  const r = el.getBoundingClientRect();
  let tx = r.right+12, ty = r.top;
  tt.style.display = 'block';
  if (tx+180>window.innerWidth) tx=r.left-180;
  if (ty+160>window.innerHeight) ty=window.innerHeight-170;
  tt.style.left=tx+'px'; tt.style.top=ty+'px';
}

function hideTooltip() { document.getElementById('tooltip').style.display='none'; }

// ─── Copy / Export ──────────────────────────────────────
function copyCodes() {
  // 复制选中的股票代码，如果没有选中则复制全部
  const allCks = document.querySelectorAll('.stock-ck:checked');
  let codes, count;
  if (allCks.length > 0) {
    codes = [...allCks].map(c => c.dataset.code).join(', ');
    count = allCks.length;
  } else if (currentCode && stockCache[currentCode]) {
    codes = stockCache[currentCode].map(s=>(s.securityCode||s.code||'')).filter(Boolean).join(', ');
    count = stockCache[currentCode].length;
  } else {
    return;
  }
  navigator.clipboard?.writeText(codes).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=codes;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  });
  showToast(`已复制 ${count} 只股票代码`);
}

function exportCsv() {
  if (!currentCode || !stockCache[currentCode]) return;
  const list = stockCache[currentCode];
  const headers=['序号','股票名称','代码','现价','涨跌幅','换手率','主力净流入','流通市值','所属板块','入选理由'];
  const rows = list.map((s,i)=>[
    i+1, s.securityName||s.name||'', s.securityCode||s.code||'',
    s.f2!=null?parseFloat(s.f2).toFixed(2):'',
    s.f3!=null?parseFloat(s.f3).toFixed(2)+'%':'',
    s.f8!=null?(parseFloat(s.f8)/100).toFixed(2)+'%':'',
    s.f62!=null?(s.f62/1e8).toFixed(2)+'亿':'',
    s.f21!=null?(s.f21/1e8).toFixed(2)+'亿':'',
    s.f100||'', (s.keywordList||[]).map(k=>k.introduction||'').join('; ')
  ]);
  const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8-sig'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download=`${currentCode}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast(`已导出 ${list.length} 条数据`);
}

// ─── Toast ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Reset ─────────────────────────────────────────────
function resetToList() {
  if (window.innerWidth <= 768) document.querySelector('.panel-left').style.display = '';
  document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
  currentCode = null;
  const panel = document.getElementById('panelMid');
  panel.classList.add('empty');
  panel.innerHTML = '👈 点击左侧板块查看成分股';
  // 清空脑图
  const canvas = document.getElementById('mindmapCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('panelRight').classList.add('empty');
  document.getElementById('mindmapTitle').textContent = '概念脑图';
}

// ─── Helpers ────────────────────────────────────────────
function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Mindmap ────────────────────────────────────────────
let mmOffsetX = 0, mmOffsetY = 0, mmDragging = false, mmLastX, mmLastY;
let mmNodes = []; // {x, y, w, h, code} for click detection

function renderMindmap(theme, stocks) {
  const canvas = document.getElementById('mindmapCanvas');
  const ctx = canvas.getContext('2d');
  const container = canvas.parentElement;
  mmNodes = [];
  
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
  
  document.getElementById('panelRight').classList.remove('empty');
  document.getElementById('mindmapTitle').textContent = `${theme?.themeName || '概念'} 脑图`;
  
  if (!stocks || stocks.length === 0) {
    ctx.fillStyle = '#8b949e';
    ctx.font = '14px Microsoft YaHei';
    ctx.textAlign = 'center';
    ctx.fillText('暂无数据', canvas.width/2, canvas.height/2);
    return;
  }
  
  const cx = canvas.width/2 + mmOffsetX;
  const cy = canvas.height/2 + mmOffsetY;
  
  // 排序：涨幅排序
  const sorted = [...stocks].sort((a,b) => (b.f3||0) - (a.f3||0));
  const top12 = sorted.slice(0, 12);
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // 颜色配置
  const COLORS = {
    center: '#f0883e',
    up: '#f85149',
    down: '#3fb950',
    flat: '#8b949e',
    line: '#30363d',
    nodeBg: '#161b22',
    nodeText: '#c9d1d9',
    flowIn: '#f85149',
    flowOut: '#3fb950',
    limitUp: '#ff6b6b',
    gold: '#ffd700'
  };
  
  // 根据A股规则判断涨停阈值
  function getLimit(code) {
    const c = String(code || '');
    if (/^(30|68)/.test(c)) return 20;
    if (c.startsWith('4') || c.startsWith('8')) return 20;
    return 10;
  }
  // 统计数据
  const stat = {
    limitUp: stocks.filter(s => (s.f3||0) >= getLimit(s.securityCode||s.code) - 0.01).length,
    limitDown: stocks.filter(s => (s.f3||0) <= -(getLimit(s.securityCode||s.code)) + 0.01).length,
    avgChange: stocks.reduce((sum, s) => sum + (s.f3||0), 0) / stocks.length,
    totalFlow: stocks.reduce((sum, s) => sum + (s.f62||0), 0)
  };
  
  // 计算最大资金流用于归一化
  const maxFlow = Math.max(...top12.map(s => Math.abs(s.f62||0)), 1e8);
  const maxMarketCap = Math.max(...top12.map(s => s.f21||1e9), 1e9);
  
  // ─── 绘制连接线（带资金流粗细和方向） ───
  top12.forEach((s, i) => {
    const angle = (i / top12.length) * Math.PI * 2 - Math.PI/2;
    const r = Math.min(canvas.width, canvas.height) * 0.34;
    const nx = cx + Math.cos(angle) * r;
    const ny = cy + Math.sin(angle) * r;
    
    const flow = s.f62 || 0;
    const flowRatio = Math.abs(flow) / maxFlow;
    const lineW = Math.max(1, flowRatio * 8);
    
    // 资金流向决定线条颜色
    const lineColor = flow > 1e6 ? COLORS.flowIn : flow < -1e6 ? COLORS.flowOut : COLORS.line;
    
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(nx, ny);
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = lineW;
    ctx.globalAlpha = 0.7;
    ctx.stroke();
    ctx.globalAlpha = 1;
    
    // 资金流入画箭头
    if (Math.abs(flow) > 1e7) {
      const midX = (cx + nx) / 2;
      const midY = (cy + ny) / 2;
      const arrowSize = 6;
      const arrowAngle = Math.atan2(ny - cy, nx - cx);
      
      ctx.beginPath();
      ctx.moveTo(midX, midY);
      ctx.lineTo(midX - arrowSize * Math.cos(arrowAngle - 0.5), midY - arrowSize * Math.sin(arrowAngle - 0.5));
      ctx.lineTo(midX - arrowSize * Math.cos(arrowAngle + 0.5), midY - arrowSize * Math.sin(arrowAngle + 0.5));
      ctx.closePath();
      ctx.fillStyle = lineColor;
      ctx.fill();
    }
  });
  
  // ─── 绘制中心节点 ───
  const centerR = 72;
  
  // 外圈：涨停数量指示
  if (stat.limitUp > 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, centerR + 8, -Math.PI/2, -Math.PI/2 + (stat.limitUp / stocks.length) * Math.PI * 2);
    ctx.strokeStyle = COLORS.limitUp;
    ctx.lineWidth = 4;
    ctx.stroke();
  }
  
  // 中心圆
  ctx.beginPath();
  ctx.arc(cx, cy, centerR, 0, Math.PI * 2);
  const centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, centerR);
  centerGrad.addColorStop(0, '#ff9f43');
  centerGrad.addColorStop(1, COLORS.center);
  ctx.fillStyle = centerGrad;
  ctx.fill();
  
  // 中心文字
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px Microsoft YaHei';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const centerName = (theme?.themeName || '概念').slice(0, 6);
  ctx.fillText(centerName, cx, cy - 12);
  
  ctx.font = '11px Microsoft YaHei';
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fillText(`${stocks.length}只成分股`, cx, cy + 4);
  
  // 板块涨跌幅
  const avgCls = stat.avgChange > 0 ? COLORS.up : stat.avgChange < 0 ? COLORS.down : COLORS.flat;
  ctx.fillStyle = avgCls;
  ctx.font = 'bold 12px SF Mono, Consolas';
  const avgText = (stat.avgChange > 0 ? '+' : '') + stat.avgChange.toFixed(2) + '%';
  ctx.fillText(avgText, cx, cy + 20);
  
  // 涨停数量标记
  if (stat.limitUp > 0) {
    ctx.fillStyle = COLORS.limitUp;
    ctx.font = 'bold 10px Microsoft YaHei';
    ctx.fillText(`🔥${stat.limitUp}涨停`, cx, cy + 34);
  }
  
  // ─── 绘制股票节点 ───
  top12.forEach((s, i) => {
    const angle = (i / top12.length) * Math.PI * 2 - Math.PI/2;
    const r = Math.min(canvas.width, canvas.height) * 0.34;
    const nx = cx + Math.cos(angle) * r;
    const ny = cy + Math.sin(angle) * r;
    
    const f3 = s.f3 || 0;
    const limitPct = getLimit(s.securityCode||s.code);
    const isLimitUp = f3 >= limitPct - 0.01;
    const color = f3 > 0 ? COLORS.up : f3 < 0 ? COLORS.down : COLORS.flat;
    
    // 市值决定节点大小
    const marketCap = s.f21 || 1e9;
    const sizeRatio = Math.sqrt(marketCap / maxMarketCap);
    const nodeW = 85 + sizeRatio * 35;
    const nodeH = 70 + sizeRatio * 15;
    const nodeX = nx - nodeW/2;
    const nodeY = ny - nodeH/2;

    // 综合排名徽章（左上角）
    const rank = s._rank || (i + 1);
    const badgeR = 11;
    const badgeX = nodeX - badgeR * 0.4;
    const badgeY = nodeY - badgeR * 0.4;
    let badgeColor, badgeTextColor;
    if (rank === 1) {
      badgeColor = '#ffd700'; badgeTextColor = '#1a1a1a';
    } else if (rank === 2) {
      badgeColor = '#c0c0c0'; badgeTextColor = '#1a1a1a';
    } else if (rank === 3) {
      badgeColor = '#cd7f32'; badgeTextColor = '#fff';
    } else if (rank <= 10) {
      badgeColor = '#e06c00'; badgeTextColor = '#fff';
    } else {
      badgeColor = '#444c56'; badgeTextColor = '#c9d1d9';
    }
    ctx.beginPath();
    ctx.arc(badgeX, badgeY, badgeR, 0, Math.PI * 2);
    ctx.fillStyle = badgeColor;
    ctx.fill();
    ctx.fillStyle = badgeTextColor;
    ctx.font = 'bold 10px SF Mono, Consolas';
    ctx.textAlign = 'center';
    ctx.fillText(String(rank), badgeX, badgeY + 3.5);
    ctx.textAlign = 'left';

    // 涨停股发光效果
    if (isLimitUp) {
      ctx.shadowColor = COLORS.limitUp;
      ctx.shadowBlur = 15;
    }
    
    // 绘制圆角矩形背景
    ctx.beginPath();
    ctx.moveTo(nodeX + 8, nodeY);
    ctx.lineTo(nodeX + nodeW - 8, nodeY);
    ctx.quadraticCurveTo(nodeX + nodeW, nodeY, nodeX + nodeW, nodeY + 8);
    ctx.lineTo(nodeX + nodeW, nodeY + nodeH - 8);
    ctx.quadraticCurveTo(nodeX + nodeW, nodeY + nodeH, nodeX + nodeW - 8, nodeY + nodeH);
    ctx.lineTo(nodeX + 8, nodeY + nodeH);
    ctx.quadraticCurveTo(nodeX, nodeY + nodeH, nodeX, nodeY + nodeH - 8);
    ctx.lineTo(nodeX, nodeY + 8);
    ctx.quadraticCurveTo(nodeX, nodeY, nodeX + 8, nodeY);
    ctx.closePath();
    ctx.fillStyle = COLORS.nodeBg;
    ctx.fill();
    
    // 边框
    ctx.strokeStyle = isLimitUp ? COLORS.gold : color;
    ctx.lineWidth = isLimitUp ? 2.5 : 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;
    
    // 股票名
    ctx.fillStyle = COLORS.nodeText;
    ctx.font = 'bold 12px Microsoft YaHei';
    ctx.textAlign = 'center';
    const name = (s.securityName || s.name || '').slice(0, 5);
    ctx.fillText(name, nx, ny - 22);
    
    // 代码（完整代码）
    ctx.fillStyle = '#8b949e';
    ctx.font = '10px SF Mono, Consolas';
    const fullCode = s.securityCode || s.code || '';
    ctx.fillText(fullCode, nx, ny - 8);
    
    // 涨跌幅
    ctx.fillStyle = color;
    ctx.font = 'bold 11px SF Mono, Consolas';
    const f3Text = (f3 > 0 ? '+' : '') + f3.toFixed(2) + '%';
    ctx.fillText(f3Text, nx, ny + 6);
    
    // ─── 市值标签 ───
    const capY = ny + 18;
    const capText = marketCap >= 1e8 ? (marketCap/1e8).toFixed(1) + '亿' : (marketCap/1e4).toFixed(0) + '万';
    ctx.fillStyle = '#8b949e';
    ctx.font = '9px Microsoft YaHei';
    ctx.fillText('市值 ' + capText, nx, capY);
    
    // ─── 资金净流入标签 ───
    const flow = s.f62 || 0;
    const flowY = ny + 30;
    
    // 资金流入背景条
    const barW = nodeW - 16;
    const barH = 4;
    const barX = nx - barW/2;
    const barY = flowY - barH/2;
    
    // 背景条
    ctx.fillStyle = '#21262d';
    ctx.fillRect(barX, barY, barW, barH);
    
    // 资金条（流入红色/流出绿色）
    const flowRatio = Math.min(Math.abs(flow) / maxFlow, 1);
    const flowBarW = barW * flowRatio;
    if (flow > 0) {
      ctx.fillStyle = COLORS.flowIn;
      ctx.fillRect(barX, barY, flowBarW, barH);
    } else if (flow < 0) {
      ctx.fillStyle = COLORS.flowOut;
      ctx.fillRect(barX + barW - flowBarW, barY, flowBarW, barH);
    }
    
    // 资金数值
    const flowNumY = flowY + 11;
    const flowAbs = Math.abs(flow);
    let flowText = '';
    if (flowAbs >= 1e8) {
      flowText = (flow > 0 ? '+' : '') + (flow/1e8).toFixed(2) + '亿';
    } else if (flowAbs >= 1e4) {
      flowText = (flow > 0 ? '+' : '') + (flow/1e4).toFixed(0) + '万';
    } else {
      flowText = (flow > 0 ? '+' : '') + flow.toFixed(0);
    }
    // 白色高亮显示，配合彩色背景
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 9px SF Mono, Consolas';
    ctx.fillText(flowText, nx, flowNumY);

    mmNodes.push({x: nodeX, y: nodeY, w: nodeW, h: nodeH, code: fullCode});
  });
  
  // ─── 图例 ───
  const legendY = canvas.height - 30;
  ctx.font = '10px Microsoft YaHei';
  ctx.fillStyle = '#8b949e';
  ctx.textAlign = 'left';
  
  ctx.fillText('节点大小 = 市值  |  进度条 = 资金净流入', 20, legendY);
  ctx.fillText('红色流入  绿色流出', 20, legendY + 14);
}

// Canvas 拖拽
function initMindmapDrag() {
  const canvas = document.getElementById('mindmapCanvas');
  
  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    for (let i = mmNodes.length - 1; i >= 0; i--) {
      const n = mmNodes[i];
      if (mx >= n.x && mx <= n.x + n.w && my >= n.y && my <= n.y + n.h) {
        openStockModal('smart_money.html##' + n.code + '##');
        return;
      }
    }
    mmDragging = true;
    mmLastX = e.clientX;
    mmLastY = e.clientY;
    canvas.style.cursor = 'grabbing';
  });
  
  canvas.addEventListener('mousemove', e => {
    if (!mmDragging) return;
    mmOffsetX += e.clientX - mmLastX;
    mmOffsetY += e.clientY - mmLastY;
    mmLastX = e.clientX;
    mmLastY = e.clientY;
    if (currentCode && stockCache[currentCode]) {
      const theme = allThemes.find(t => t.themeCode === currentCode);
      renderMindmap(theme, stockCache[currentCode]);
    }
  });
  
  canvas.addEventListener('mouseup', () => {
    mmDragging = false;
    canvas.style.cursor = 'grab';
  });
  
  canvas.addEventListener('mouseleave', () => {
    mmDragging = false;
    canvas.style.cursor = 'grab';
  });
  
  canvas.style.cursor = 'grab';
}

// 窗口大小变化时重绘

});

let selectedStocks = new Set(); // store codes

function onStockCk(el) {
  const code = el.dataset.code;
  const name = el.dataset.name;
  if (el.checked) selectedStocks.add(code);
  else selectedStocks.delete(code);
  // sync "select all" checkbox
  const allCks = document.querySelectorAll('.stock-ck');
  const allChecked = allCks.length > 0 && [...allCks].every(c => c.checked);
  const ckAll = document.getElementById('ckAll');
  if (ckAll) ckAll.checked = allChecked;
  updateCompareBtn();
}

function toggleAllCk(checked) {
  const allCks = document.querySelectorAll('.stock-ck');
  allCks.forEach(c => { c.checked = checked; if (checked) selectedStocks.add(c.dataset.code); else selectedStocks.delete(c.dataset.code); });
  updateCompareBtn();
}

function updateCompareBtn() {
  const btn = document.getElementById('compareBtn');
  const cnt = document.getElementById('selCount');
  if (btn) btn.disabled = selectedStocks.size < 2;
  if (cnt) cnt.textContent = selectedStocks.size;
}

function openCompare() {
  if (selectedStocks.size < 2) { showToast('请至少选择2只股票'); return; }
  // Build code list with names: code:name,code:name
  const allCks = document.querySelectorAll('.stock-ck:checked');
  const items = [...allCks].map(c => `${c.dataset.code}:${c.dataset.name}`);
  const url = `stock-compare.html?codes=${encodeURIComponent(items.join(','))}`;
  openStockModal(url);
}

// ─── Scatter Chart ──────────────────────────────────────
let hotspotScatterChart = null;
let hotspotHeatmapChart = null;

function renderScatterChart(theme, stocks) {
  const container = document.getElementById('scatterContainer');
  if (!container || !stocks || stocks.length === 0) return;

  // Ensure container size
  const panel = document.getElementById('panelRight');
  container.style.width = panel.clientWidth + 'px';
  container.style.height = panel.clientHeight + 'px';

  // Dispose old instance
  if (hotspotScatterChart && !hotspotScatterChart.isDisposed()) {
    hotspotScatterChart.dispose();
  }
  hotspotScatterChart = echarts.init(container);

  // Build data points
  const pts = [];
  const sorted = [...stocks].sort((a, b) => Math.abs(b.f62 || 0) - Math.abs(a.f62 || 0));
  const maxAmount = Math.max(...sorted.map(s => Math.abs(s.f62 || 0)), 1);

  sorted.forEach(function(s, i) {
    const f3 = s.f3 != null ? parseFloat(s.f3) : 0;
    const f62 = s.f62 != null ? parseFloat(s.f62) : 0;
    const name = s.securityName || s.name || '';
    const code = s.securityCode || s.code || '';

    // Percentile rank for size
    const rank = i;
    const total = sorted.length;
    const pct = total > 1 ? 1 - rank / (total - 1) : 1;
    const r = 6 + 64 * pct * pct; // 6~70px, square curve

    // Color by change
    const color = f3 >= 0 ? '#f85149' : '#3fb950';

    pts.push({
      value: [f62, f3],
      symbolSize: r,
      itemStyle: { color: color, opacity: 0.85 },
      _name: name,
      _code: code
    });
  });

  const themeName = theme ? theme.themeName : '板块';

  hotspotScatterChart.setOption({
    backgroundColor: '#0d1117',
    title: {
      text: themeName + ' 资金流 vs 涨跌幅',
      top: 8, left: 'center',
      textStyle: { color: '#8b949e', fontSize: 13, fontWeight: 500 }
    },
    grid: { top: 50, right: 30, bottom: 50, left: 70 },
    tooltip: {
      trigger: 'item',
      formatter: function(p) {
        if (!p.data) return '';
        const d = p.data;
        const f62 = d.value[0];
        const f3 = d.value[1];
        const flowAbs = Math.abs(f62);
        let flowStr = '';
        if (flowAbs >= 1e8) flowStr = (f62/1e8).toFixed(2) + '亿';
        else if (flowAbs >= 1e4) flowStr = (f62/1e4).toFixed(0) + '万';
        else flowStr = f62.toFixed(0);
        const f3Str = (f3 > 0 ? '+' : '') + f3.toFixed(2) + '%';
        return '<b>' + d._name + '</b> (' + d._code + ')<br/>' +
               '主力净流入: <b>' + flowStr + '</b><br/>' +
               '涨跌幅: <b>' + f3Str + '</b>';
      },
      backgroundColor: 'rgba(22,27,34,0.95)',
      borderColor: '#30363d',
      textStyle: { color: '#e6edf3', fontSize: 12 }
    },
    xAxis: {
      name: '主力净流入',
      nameTextStyle: { color: '#8b949e', fontSize: 11 },
      type: 'value',
      axisLabel: {
        color: '#8b949e', fontSize: 10,
        formatter: function(v) {
          const a = Math.abs(v);
          if (a >= 1e8) return (v/1e8).toFixed(1) + '亿';
          if (a >= 1e4) return (v/1e4).toFixed(0) + '万';
          return v.toFixed(0);
        }
      },
      splitLine: { lineStyle: { color: 'rgba(48,54,61,0.5)', type: 'dashed' } },
      axisLine: { lineStyle: { color: '#30363d' } }
    },
    yAxis: {
      name: '涨跌幅(%)',
      nameTextStyle: { color: '#8b949e', fontSize: 11 },
      type: 'value',
      axisLabel: {
        color: '#8b949e', fontSize: 10,
        formatter: function(v) { return (v > 0 ? '+' : '') + v.toFixed(1) + '%'; }
      },
      splitLine: { lineStyle: { color: 'rgba(48,54,61,0.5)', type: 'dashed' } },
      axisLine: { lineStyle: { color: '#30363d' } }
    },
    series: [{
      type: 'scatter',
      data: pts,
      label: {
        show: true,
        formatter: function(p) { return p.data._name; },
        position: 'inside',
        fontSize: function(p) { return (p.data.symbolSize || 0) > 35 ? 11 : 9; },
        color: '#fff',
        fontWeight: 'bold',
        textShadowColor: 'rgba(0,0,0,0.7)',
        textShadowBlur: 3
      },
      emphasis: { itemStyle: { shadowBlur: 12 } }
    }]
  });

  // Click bubble → open stock modal (smart_money page)
  hotspotScatterChart.on('click', function(params) {
    if (params.data && params.data._code) {
      syncStockInteraction(params.data._code, true);
      openStockModal('smart_money.html##' + params.data._code + '##');
    }
  });
  // Hover → highlight both charts and table
  hotspotScatterChart.on('mouseover', function(params) {
    if (params && params.data && (params.data._code || params.data.code)) syncStockInteraction(params.data._code || params.data.code, true);
  });
  hotspotScatterChart.on('globalout', function() { clearHighlights(); });
}

function renderHeatmapChart(theme, stocks) {
  const container = document.getElementById('heatmapChart');
  if (!container || !stocks || stocks.length === 0) return;
  const panel = document.getElementById('panelRight');
  container.style.width = panel.clientWidth + 'px';
  container.style.height = panel.clientHeight + 'px';

  if (hotspotHeatmapChart && !hotspotHeatmapChart.isDisposed()) {
    hotspotHeatmapChart.dispose();
  }
  hotspotHeatmapChart = echarts.init(container);

  const themeName = theme ? theme.themeName : '板块';
  const items = stocks.map(s => {
    const f3 = s.f3 != null ? parseFloat(s.f3) : 0;
    const value = Math.max(parseFloat(s.f21) || 0, 1);
    const name = s.securityName || s.name || '未知';
    const code = s.securityCode || s.code || '未知';
    const price = s.f2 != null ? parseFloat(s.f2) : null;
    const turnover = s.f8 != null ? parseFloat(s.f8) : null;
    const flow = s.f62 != null ? parseFloat(s.f62) : 0;
    return {
      name,
      value,
      code,
      change: f3,
      price,
      turnover,
      flow,
      marketCap: value,
      itemStyle: {
        color: getHeatmapColor(f3)
      }
    };
  });

  hotspotHeatmapChart.setOption({
    backgroundColor: '#0d1117',
    title: {
      text: `${themeName} 成分股热力图`,
      left: 'center',
      top: 12,
      textStyle: { color: '#8b949e', fontSize: 14, fontWeight: 500 }
    },
    tooltip: {
      trigger: 'item',
      formatter: function(info) {
        const data = info.data;
        const flow = Math.abs(data.flow) >= 1e8 ? (data.flow/1e8).toFixed(2) + '亿'
                    : Math.abs(data.flow) >= 1e4 ? (data.flow/1e4).toFixed(0) + '万'
                    : data.flow.toFixed(0);
        const turnoverText = data.turnover != null ? data.turnover.toFixed(2) + '%' : '--';
        const priceText = data.price != null ? data.price.toFixed(2) : '--';
        const capText = data.marketCap ? (data.marketCap >= 1e8 ? (data.marketCap/1e8).toFixed(2) + '亿'
                    : data.marketCap >= 1e4 ? (data.marketCap/1e4).toFixed(0) + '万'
                    : data.marketCap.toFixed(0)) : '--';
        return `${data.name} (${data.code})<br/>涨跌幅: ${data.change > 0 ? '+' : ''}${data.change.toFixed(2)}%<br/>现价: ${priceText}<br/>换手率: ${turnoverText}<br/>主力净流入: ${flow}<br/>流通市值: ${capText}`;
      },
      backgroundColor: 'rgba(22,27,34,0.95)',
      borderColor: '#30363d',
      textStyle: { color: '#e6edf3', fontSize: 12 }
    },
    series: [{
      type: 'treemap',
      roam: false,
      nodeClick: false,
      breadcrumb: { show: false },
      top: 60,
      left: 10,
      right: 10,
      bottom: 10,
      label: {
        show: true,
        formatter: function(info) {
          const name = info.name || '';
          const value = info.data.change != null ? (info.data.change > 0 ? '+' : '') + info.data.change.toFixed(2) + '%' : '';
          return `${name}
${value}`;
        },
        color: '#eef2f5',
        fontSize: 12,
        align: 'center',
        verticalAlign: 'middle',
        lineHeight: 18
      },
      upperLabel: { show: false },
      itemStyle: {
        borderColor: '#0d1117',
        borderWidth: 2
      },
      data: items
    }]
  });

  hotspotHeatmapChart.on('click', function(params) {
    if (params && params.data && params.data.code) {
      openStockModal('smart_money.html##' + params.data.code + '##');
    }
  });
  // Hover → highlight both charts and table
  hotspotHeatmapChart.on('mouseover', function(params) {
    if (params && params.data && (params.data.code || params.data._code)) syncStockInteraction(params.data.code || params.data._code, true);
  });
  hotspotHeatmapChart.on('globalout', function() { clearHighlights(); });

  function getHeatmapColor(f3) {
    const intensity = Math.min(1, Math.abs(f3) / 8);
    if (f3 >= 0) {
      const r = Math.round(220 + intensity * 20);
      const g = Math.round(86 - intensity * 40);
      const b = Math.round(92 - intensity * 40);
      return `rgb(${r},${g},${b})`;
    }
    const r = Math.round(70 - intensity * 20);
    const g = Math.round(190 - intensity * 40);
    const b = Math.round(80 + intensity * 60);
    return `rgb(${r},${g},${b})`;
  }
}

function squarify(items, x, y, W, H) {

  const rects = new Array(items.length);
  if (!items || items.length === 0 || W <= 0 || H <= 0) return rects;
  
  // 计算总市值
  const total = items.reduce((s, v) => s + (v.f21 || 1), 0);
  if (total <= 0) return rects;
  
  // 递归切片 treemap
  function layout(list, startX, startY, width, height) {
    if (list.length === 0 || width < 20 || height < 20) return;
    
    if (list.length === 1) {
      rects[list[0].idx] = { x: startX + 1, y: startY + 1, w: width - 2, h: height - 2 };
      return;
    }
    
    const listTotal = list.reduce((s, v) => s + (v.f21 || 1), 0);
    
    let bestCut = 1;
    let bestRatio = Infinity;
    let runningSum = 0;
    
    for (let i = 0; i < list.length - 1; i++) {
      runningSum += list[i].f21 || 1;
      const ratio = runningSum / listTotal;
      const aspectRatio = width >= height
        ? Math.max(ratio * width / height, height / (ratio * width))
        : Math.max(ratio * height / width, width / (ratio * height));
      
      if (aspectRatio < bestRatio) {
        bestRatio = aspectRatio;
        bestCut = i + 1;
      }
    }
    
    const firstHalf = list.slice(0, bestCut);
    const secondHalf = list.slice(bestCut);
    const firstTotal = firstHalf.reduce((s, v) => s + (v.f21 || 1), 0);
    const splitRatio = firstTotal / listTotal;
    
    if (width >= height) {
      const splitW = width * splitRatio;
      layout(firstHalf, startX, startY, splitW, height);
      layout(secondHalf, startX + splitW, startY, width - splitW, height);
    } else {
      const splitH = height * splitRatio;
      layout(firstHalf, startX, startY, width, splitH);
      layout(secondHalf, startX, startY + splitH, width, height - splitH);
    }
  }
  
  const indexedItems = items.map((v, i) => ({ ...v, idx: i }));
  layout(indexedItems, x, y, W, H);
  
  return rects;
}

window.addEventListener('resize', function() {
  if (currentRightView === 'scatter' && hotspotScatterChart && !hotspotScatterChart.isDisposed()) {
    hotspotScatterChart.resize();
  }
  if (currentRightView === 'heatmap') {
    const theme = allThemes.find(t => t.themeCode === currentCode);
    if (theme) renderHeatmapChart(theme, stockCache[currentCode]);
  }
});

</script>
