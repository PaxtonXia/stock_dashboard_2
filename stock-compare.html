<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多股同列</title>
<script src="js/echarts.js"></script>
<script src="js/utils.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#1a1a2e 100%);color:#e0e0e0;width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column}

.header{display:flex;flex-direction:column;gap:0;background:rgba(22,27,34,.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(48,54,61,.8);flex-shrink:0;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.header-top{display:flex;align-items:center;gap:12px;padding:12px 16px}
.header h2{font-size:15px;font-weight:600;white-space:nowrap;color:#f0f6fc;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.header h2::before{content:'';width:3px;height:14px;background:linear-gradient(180deg,#4a9eff,#6f42c1);border-radius:2px;margin-right:8px;display:inline-block}
.search-wrap{position:relative;display:flex;gap:6px;align-items:center;flex:1;max-width:280px}
.search-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:6px 12px;color:#e0e0e0;font-size:13px;width:100%;transition:all .2s}
.search-input:focus{outline:none;border-color:#4a9eff;background:rgba(74,158,255,.08)}
.search-input::placeholder{color:#6e7681}
.search-btn{background:#4a9eff;border:none;border-radius:6px;padding:6px 14px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.search-btn:hover{background:#58a6ff}
.autocomplete{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#21262d;border:1px solid rgba(48,54,61,.8);border-radius:6px;max-height:200px;overflow-y:auto;z-index:1000;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.autocomplete.show{display:block}
.autocomplete-item{padding:8px 12px;cursor:pointer;border-bottom:1px solid rgba(48,54,61,.5);font-size:13px}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:hover{background:rgba(74,158,255,.1)}
.autocomplete-item .sname{color:#e6edf3;font-weight:500}
.autocomplete-item .scode{font-size:11px;color:#7d8590;margin-left:8px;font-family:'SF Mono',Consolas,monospace}
.header-info{display:flex;align-items:center;gap:8px;font-size:12px;color:#8b949e}
.header-info .sep{width:1px;height:10px;background:rgba(48,54,61,.8)}
.header-legends{display:flex;flex-wrap:wrap;gap:8px;padding:10px 16px;background:rgba(0,0,0,.2);border-top:1px solid rgba(48,54,61,.4);min-height:42px;align-items:center}
.header-legends:empty::before{content:'搜索添加股票（最多12只）';color:#484f58;font-size:12px;font-style:italic}
.legend-item{display:flex;align-items:center;gap:4px;white-space:nowrap;padding:5px 10px;background:rgba(255,255,255,.06);border:1px solid rgba(48,54,61,.6);border-radius:5px;font-size:12px;cursor:pointer;transition:all .15s;width:140px}
.legend-item:hover{background:rgba(255,255,255,.1);transform:translateY(-1px)}
.legend-item.inactive{opacity:.35}
.legend-item .cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-item .lname{color:#e6edf3;font-weight:500;overflow:hidden;text-overflow:ellipsis;flex:1}
.legend-item .lchg{font-family:'SF Mono',Consolas,monospace;font-size:11px;padding:1px 4px;border-radius:3px;font-weight:600}
.legend-item .lremove{color:#f85149;font-size:14px;margin-left:2px;cursor:pointer;line-height:1;opacity:.6;transition:opacity .2s}
.legend-item .lremove:hover{opacity:1}
.chart-wrap{flex:1;min-height:0;position:relative;padding:10px;background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,.2) 100%)}
#chart{width:100%;height:100%;border-radius:10px;background:rgba(13,17,23,.5)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(33,38,45,.95);border:1px solid rgba(48,54,61,.8);color:#e6edf3;padding:8px 16px;border-radius:6px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.status-bar{display:flex;align-items:center;gap:10px;padding:6px 16px;background:rgba(22,27,34,.6);border-top:1px solid rgba(48,54,61,.5);font-size:11px;color:#7d8590;flex-shrink:0}
.status-bar .time{font-family:'SF Mono',Consolas,monospace}
.status-bar .sep{width:1px;height:10px;background:rgba(48,54,61,.8)}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h2>多股同列</h2>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" placeholder="搜索股票名称或代码" autocomplete="off">
      <button class="search-btn" onclick="addBySearch()">添加</button>
      <div class="autocomplete" id="autocomplete"></div>
    </div>
    <div class="header-info">
      <span id="stockCount">0/12 只</span>
      <span class="sep"></span>
      <span id="marketStatus">--</span>
    </div>
  </div>
  <div class="header-legends" id="legends"></div>
</div>

<div class="chart-wrap"><div id="chart"></div></div>

<div class="status-bar">
  <span class="time" id="currentTime"></span>
  <span class="sep"></span>
  <span id="stockCount">0 只股票</span>
  <span class="sep"></span>
  <span id="marketStatus">--</span>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Config ────────────────────────────────────────────
const COLORS = ['#4a9eff','#f0883e','#3fb950','#bc8cff','#f85149','#d29922','#39d2c0','#ff6b9d','#a5d8ff','#e599f7','#ffec99','#96f2d7'];
let tradingTimes = generateTradingTimeAxis();
let myChart = null;
let allStocks = [];
let stockPool = []; // {name, code, color, data, changePercent}

// ─── Init ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  myChart = echarts.init(document.getElementById('chart'), null, {renderer:'canvas'});
  window.addEventListener('resize', () => myChart.resize());

  // Load stock list for search
  try {
    const res = await fetch('data/a_stock_codes.json');
    if (res.ok) allStocks = (await res.json()).stocks || [];
  } catch(e) { console.warn('股票列表加载失败，搜索不可用'); }

  // Parse URL params: ?codes=600000.SH:平安银行,000001.SZ:平安银行
  const params = new URLSearchParams(location.search);
  const codesStr = params.get('codes');
  if (codesStr) {
    const items = codesStr.split(',').filter(Boolean);
    for (let i = 0; i < items.length; i++) {
      const parts = items[i].split(':');
      const code = parts[0];
      const name = parts[1] || code;
      addStock(code, name);
    }
  }

  // Also support hash: #600000.SH:平安银行,000001.SZ:某某
  if (!codesStr && location.hash) {
    const hashStr = location.hash.slice(1);
    const items = hashStr.split(',').filter(Boolean);
    for (let i = 0; i < items.length; i++) {
      const parts = items[i].split(':');
      const code = parts[0];
      const name = parts[1] || code;
      addStock(code, name);
    }
  }

  // Search autocomplete
  const input = document.getElementById('searchInput');
  input.addEventListener('input', () => {
    const q = input.value.trim();
    if (!q) { hideAC(); return; }
    const results = searchStocks(q).slice(0, 8);
    showAC(results);
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') addBySearch();
  });

  // Auto refresh during trading
  startAutoRefresh();
  
  // Update status bar
  updateStatusBar();
  setInterval(updateStatusBar, 1000);
});

// ─── Status Bar ───────────────────────────────────────
function updateStatusBar() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('currentTime').textContent = timeStr;
  document.getElementById('stockCount').textContent = stockPool.length + '/12 只';
  
  const h = now.getHours(), m = now.getMinutes();
  const isTrading = (h >= 9 && h < 15) || (h === 9 && m >= 30) || (h >= 13 && h < 15);
  const status = isTrading ? '🟢 交易中' : '⚫ 已收盘';
  document.getElementById('marketStatus').textContent = status;
}

// ─── Search ────────────────────────────────────────────
function searchStocks(query) {
  if (!query || !allStocks.length) return [];
  const q = query.toLowerCase();
  const results = [];
  for (const s of allStocks) {
    if (s.name.toLowerCase().includes(q) || s.code.includes(q)) {
      results.push(s);
      if (results.length >= 10) break;
    }
  }
  return results;
}

function showAC(results) {
  const el = document.getElementById('autocomplete');
  if (!results.length) { el.classList.remove('show'); return; }
  el.innerHTML = results.map(s =>
    `<div class="autocomplete-item" onclick="selectAC('${s.code}','${s.name}')"><span class="sname">${s.name}</span><span class="scode">${s.code}</span></div>`
  ).join('');
  el.classList.add('show');
}

function hideAC() { document.getElementById('autocomplete').classList.remove('show'); }

function selectAC(code, name) {
  document.getElementById('searchInput').value = name;
  hideAC();
  addStock(code, name);
  document.getElementById('searchInput').value = '';
}

function addBySearch() {
  const input = document.getElementById('searchInput');
  const q = input.value.trim();
  if (!q) return;
  const results = searchStocks(q);
  if (results.length > 0) {
    addStock(results[0].code, results[0].name);
    input.value = '';
    hideAC();
  } else {
    showToast('未找到匹配股票');
  }
}

// ─── Stock Management ──────────────────────────────────
function addStock(code, name) {
  // Skip if already added
  if (stockPool.find(s => s.code === code)) return;
  if (stockPool.length >= 12) { showToast('最多同列12只'); return; }

  const color = COLORS[stockPool.length % COLORS.length];
  const stock = { name, code, color, data: new Array(tradingTimes.length).fill(null), changePercent: 0, openPrice: 0 };
  stockPool.push(stock);
  fetchStockData(stock);
  renderChart();
  renderLegends();
}

function removeStock(code) {
  stockPool = stockPool.filter(s => s.code !== code);
  renderChart();
  renderLegends();
}

// ─── Data Fetching ─────────────────────────────────────
function toMarketCode(code) {
  if (code.includes('.')) return code;
  if (/^6/.test(code)) return code + '.SS';
  if (/^0|^3/.test(code)) return code + '.SZ';
  return code;
}

async function fetchStockData(stock) {
    try {
    const marketCode = toMarketCode(stock.code);
    const res = await fetch(`https://api-ddc-wscn.xuangubao.com.cn/market/trend?fields=tick_at,close_px&prod_code=${marketCode}&period=1m`);
    const json = await res.json();

    let trends = [];
    let preClosePrice = 0;
    
    if (json.data?.candle?.[marketCode]?.lines) {
    trends = json.data.candle[marketCode].lines.map(line => ({ tick_at: line[0] * 1000, close_px: line[1] }));
    preClosePrice = parseFloat(json.data.candle[marketCode].pre_close_px) || 0;
    } else if (json.data?.trends) {
    trends = json.data.trends.map(t => ({ ...t, tick_at: parseInt(t.tick_at) * 1000 }));
    }

    if (trends.length > 0) {
      console.log(`[DEBUG] ${stock.name} trends count:`, trends.length, 'first:', trends[0], 'last:', trends[trends.length-1]);
      const result = processApiData(trends, [...stock.data], preClosePrice);
      console.log(`[DEBUG] ${stock.name} result:`, 'openPrice:', result.openPrice, 'changePercent:', result.changePercent, 'data sample:', result.data.slice(0, 5));
      stock.data = result.data;
      stock.changePercent = result.changePercent;
      stock.openPrice = result.openPrice;
      renderChart();
      renderLegends();
    } else {
      console.warn(`[DEBUG] ${stock.name} no trends data, json:`, json);
    }
  } catch (e) {
    console.error(`获取 ${stock.name} 数据失败:`, e);
  }
}

function processApiData(trends, data, preClosePrice = 0) {
  if (!Array.isArray(trends) || trends.length === 0) {
    return { data, changePercent: 0, openPrice: 0, lastValidValueIndex: -1 };
  }

 const firstTradePrice = parseFloat(trends[0]?.close_px) || 0;
 const basePrice = preClosePrice || firstTradePrice; // 用昨日收盘价作为基准
 const openPrice = firstTradePrice; // 今日开盘价
  let lastPrice = openPrice;
  let lastValidValueIndex = -1;
  const morning11_29Index = tradingTimes.indexOf('11:29');
  const afternoon13_00Index = tradingTimes.indexOf('13:00');

  const newData = [...data];

  trends.forEach(item => {
    const timestamp = parseInt(item.tick_at);
    const closePrice = parseFloat(item.close_px);

    if (isNaN(timestamp) || timestamp <= 0 || isNaN(closePrice)) return;

    const time = new Date(timestamp);
    // 强制使用上海时区 (UTC+8)
    const shanghaiTime = new Date(time.toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
    const hours = shanghaiTime.getHours();
    const minutes = shanghaiTime.getMinutes();
    const timeStr = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
    const index = tradingTimes.indexOf(timeStr);

    if (index !== -1 && openPrice > 0) {
      const pct = Number(((closePrice - basePrice) / basePrice * 100).toFixed(2));
      newData[index] = pct;
      if (closePrice > 0) {
        lastPrice = closePrice;
        lastValidValueIndex = index;
      }
    }
  });

  // No lunch gap nulls needed - tradingTimes already skips 11:31-12:59

  const changePercent = (basePrice > 0 && lastValidValueIndex !== -1)
  ? Number(((lastPrice - basePrice) / basePrice * 100).toFixed(2))
  : 0;

  return { data: newData, changePercent, openPrice, lastValidValueIndex };
}

// ─── Chart ─────────────────────────────────────────────
function renderChart() {
  if (!myChart) return;

  const series = stockPool.map((stock, idx) => ({
    name: stock.name,
    type: 'line',
    smooth: true,
    symbol: 'none',
    lineStyle: { color: stock.color, width: 2 },
    areaStyle: {
      color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
        { offset: 0, color: stock.color + '20' },
        { offset: 1, color: stock.color + '03' }
      ])
    },
    emphasis: {
      focus: 'series',
      lineStyle: { width: 3, shadowBlur: 10, shadowColor: stock.color }
    },
    connectNulls: true,
    data: stock.data
  }));

  const option = {
    title: { show: false },
    tooltip: {
      trigger: 'axis',
      backgroundColor: 'rgba(30,30,50,0.95)',
      borderColor: 'rgba(255,255,255,0.15)',
      textStyle: { color: '#e0e0e0', fontSize: 12 },
      formatter: function(params) {
        if (!params || !params.length) return '';
        const time = params[0].axisValue;
        // 过滤有效数据并按涨跌幅降序排序
        const valid = params.filter(p => p.value !== null && p.value !== undefined)
          .map(p => ({
            name: p.seriesName,
            value: parseFloat(p.value),
            stock: stockPool.find(s => s.name === p.seriesName)
          }))
          .sort((a, b) => b.value - a.value);
        
        let html = `<div style="font-weight:600;margin-bottom:4px">${time}</div>`;
        valid.forEach(item => {
          const c = item.stock ? item.stock.color : '#fff';
          const chgColor = item.value >= 0 ? '#f85149' : '#3fb950';
          const sign = item.value >= 0 ? '+' : '';
          html += `<div style="display:flex;justify-content:space-between;align-items:center;margin:2px 0">
            <span style="display:flex;align-items:center"><span style="color:${c};margin-right:4px">●</span><span style="color:${c}">${item.name}</span></span>
            <span style="margin-left:8px;font-family:'SF Mono',Consolas,monospace;color:${chgColor}">${sign}${item.value.toFixed(2)}%</span>
          </div>`;
        });
        return html;
      }
    },
    grid: { left: '3%', right: '4%', bottom: '3%', top: '8%', containLabel: true },
    xAxis: [{
      type: 'category',
      boundaryGap: false,
      data: tradingTimes,
      axisLine: { lineStyle: { color: 'rgba(255,255,255,0.15)' } },
      axisLabel: {
        color: 'rgba(255,255,255,0.5)',
        formatter: function(v) {
          const imp = ['09:30','10:00','10:30','11:00','11:30','13:00','13:30','14:00','14:30','15:00'];
          return imp.includes(v) ? v : '';
        },
        interval: 0
      },
      splitLine: {
        show: true,
        interval: function(idx, v) { return v.endsWith(':00') || v.endsWith(':30'); },
        lineStyle: { color: 'rgba(255,255,255,0.05)', type: 'dashed' }
      }
    }],
    yAxis: [{
      type: 'value',
      axisLine: { lineStyle: { color: 'rgba(255,255,255,0.15)' } },
      axisLabel: { color: 'rgba(255,255,255,0.5)', formatter: '{value}%' },
      splitLine: { show: true, lineStyle: { color: 'rgba(255,255,255,0.06)', type: 'dashed' } },
      splitNumber: 6
    }],
    series
  };

  myChart.setOption(option, true);
}

// ─── Legends ───────────────────────────────────────────
function renderLegends() {
  const el = document.getElementById('legends');
  el.innerHTML = stockPool.map((s, i) => {
    const chg = s.changePercent;
    const chgCls = chg > 0 ? 'color:#f85149' : chg < 0 ? 'color:#3fb950' : 'color:#8b949e';
    const chgText = (chg > 0 ? '+' : '') + chg.toFixed(2) + '%';
    return `<div class="legend-item" onclick="toggleLegend(${i})" id="leg-${i}">
      <span class="cdot" style="background:${s.color}"></span>
      <span class="lname">${s.name}</span>
      <span class="lchg" style="${chgCls}">${chgText}</span>
      <span class="lremove" onclick="event.stopPropagation();removeStock('${s.code}')">✕</span>
    </div>`;
  }).join('');
}

function toggleLegend(idx) {
  const el = document.getElementById(`leg-${idx}`);
  if (!el) return;
  el.classList.toggle('inactive');
  // Toggle series visibility
  if (myChart) {
    myChart.dispatchAction({ type: 'toggleSelectSeries', seriesIndex: idx });
  }
}

// ─── Auto Refresh ──────────────────────────────────────
let refreshTimer = null;
function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    const now = new Date();
    const d = new Date(now.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }));
    const day = d.getDay();
    if (day === 0 || day === 6) return;
    const h = d.getHours(), m = d.getMinutes();
    const mins = h * 60 + m;
    if ((mins >= 9*60+15 && mins < 11*60+30) || (mins >= 13*60 && mins < 15*60)) {
      stockPool.forEach(s => fetchStockData(s));
    }
  }, 30000);
}

// ─── Toast ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
